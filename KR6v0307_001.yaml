body:
  text: 歸命彼世尊應供正等覺者序說諸天中之天中天受天阿修羅供養清淨禁戒說雙論其義與法悉甚深次及第七大雄氏名色滅者為其名所說發趣極甚深論法細飾莊嚴教我今應將次第釋汝等當宜一心聽依正等覺說如實言於順發趣依二十二種三法所廣說名為三法發趣依百種二法所廣說名為二法發趣由是更取二十二種三法涉入百種二法中而說名為二法三法發趣更取百種二法涉入二十二種三法中而說名為三法二法發趣又三法涉入於同三法中而說名為三法三法發趣二法涉入於同二法中而說名為二法二法發趣如是頌曰三法妙發趣及最上二法更二法三法並三法二法與三法三法二法二法俱順中六論法其法為甚深於逆發趣亦依二十二種三法名三法發趣依百種二法名二法發趣二十二種三法涉入百種二法中名二法三法發趣百種二法涉入二十二種三法中名三法二法發趣三法涉入於同三法名三法三法發趣二法涉入於同二法名二法二法發趣如是於逆發趣亦以六論法而廣說之故說頌言三法妙發趣及最上二法更二法三法並三法二法與三法三法二法二法俱逆中六論法其法為甚深由是更於順逆發趣亦依前式所示六論法故頌之曰三法妙發趣及最上二法更二法三法並三法二法與三法三法二法二法俱順逆中六論其法為甚深其次於逆順發趣亦同依此六論法而廣說之故頌之曰三法妙發趣及最上二法更二法三法並三法二法與三法三法二法二法俱逆順中六論其法為甚深如是於順六發趣於逆六發趣於順逆六發趣於逆順六發趣綜此二十四全部發趣乃與之以發趣大論之名已說由綜斯等二十四全部發趣名發趣大論則其發趣名義應亟先知由何義故為鉢多那為由種種品類之緣義故何以故鉢之為語表種種品類之義多那之聲是表緣義在處非處善性等中所謂緣義實即多那聲故今就種種品類之緣而有所說故於此等二十四鉢多那中一一名之為鉢多那又為此等鉢多那之總合故以此全論為鉢多那應知有餘理趣由何義故名鉢多那為由分別義故何以故謂於隨處顯示施設故建立故開示故分別故故知鉢多那之為分別義今將善等諸法就因緣等而分別之故於此等二十四鉢多那一一名之為鉢多那又為此等鉢多那之總合故綜此全論名為鉢多那應知有餘理趣由何義故名鉢多那為由發趣義故謂有由進發義如云從牛舍出而行之牛時用鉢多那之語而言出行之牛則由是義為進發故何以故於理趣不甚詳之法集論等一切智性智不易無礙進發及將善等由因緣等之類而分別之遂得詳審理趣之結果一切智性智轉展無礙而進發以此之故於此等二十四鉢多那一一名之為鉢多那然又以此等鉢多那之總合故亦名此全論為鉢多那應知此中先就順發趣言初就三法而說故名為三法鉢多那分解其句則以此處所云諸三法之鉢多那緣為三法鉢多那在此說中有對於三法之種種品類之緣之義也其次考察諸三法之鉢多那分別即為三法鉢多那由因緣等分別三法之義也第三考察由因緣等類所分別中有宗義之廣說故向於三法之鉢多那發趣進發即為三法鉢多那為一切智性智無礙發動地之義也二法鉢多那等亦同此理趣如是知順六發趣則逆等六發趣亦可由此方法而知然於順逆順逆逆順等四各各有六成二十四故言二十四全發趣此等二十四各個趣稱為小發趣總合而為全發趣由此二十四全發趣之總合名之為發趣大論然此依三法等而廣說故言三法發趣二法發趣乃至三法三法發趣二法二法發趣等分別論列今為開示分別三法之諸緣先於初所說名為論母設置分亦名緣分別分此由略說與廣說二部所成因緣乃至不去緣者為略說也略說分釋因緣一此中以之為因又以為緣謂之因緣為因故為緣故謂依因而為緣所緣緣等亦同此理趣此中因者為論之成分因由及根之異名論之成分謂宗因等屬世間語之為因也然在佛教言凡因生之諸法等時因者因由也三善因三不善因等者謂根即為因今正為是根義又此處言緣者為如次語以緣故由此而行之為緣非排斥彼而轉之義也何以故凡某法非排斥某法而或住或生者則謂其後法對於前法為緣若就相言則以助成為相者為緣何以故凡某法對於某法之住或於其生助之成者則謂其前法對於其後法為緣緣因因由緒緣生起出生等義一而語殊結合此由於根義而為因助成義而為緣之二語則以由於根義助成之法為因緣也彼因緣者於對善等而成就善等之性者實如對於稻等之籾種對於寶珠光等之寶珠色等此是諸阿闍梨之意趣也然若如是則於彼因緣等起諸色不得為因緣性何以故彼非成就彼等色之善等性故然亦非不為因緣何以故論有是言因者於因相應諸法及彼等起諸色由因緣而為緣故而於諸無因心無之者則為成立彼之無記也又雖為諸有因心彼之善等性為依於如理作意等者非依於相應之因也若於諸相應之因中自性便有善等性而彼等為依於諸相應中之因者則無貪應是善亦應是無記然以兩者俱有故如於諸相應之因於如是諸因亦應許為善等性矣然以諸因之所有根義不取善等性之完成而少取善安住性之完成亦應無礙何以故已得因緣之諸法雖如樹有已生長之根堅固而善安住然諸無因法如胡麻芽等之水草非善安住故此則由於根義而助成由於善安住性之完成而助成其法當為因緣所緣緣以下諸法中助成法之由於為所緣者為所緣緣彼由於色等者六種論舉色處對於眼識界為始乃至結論凡以如如之法為緣而如如諸法即諸心心所法生則為如是如是諸法於如是如是諸心心所法由所緣緣為緣終故不論何法莫非所緣緣恰如力弱士夫攀棒或繩得起佇立諸心心所法以色等所緣為緣而生而住亦復如是故所緣諸法於一切心心所法為所緣緣應知增上緣依於主義而助成之法為增上緣此依俱生及所緣二種此中由欲增上對於欲相應諸法及彼等起諸色由增上緣為緣等語觀之可知名為欲勤心觀之四法為俱生增上緣而非為一切增上也何以故以欲為主為首而心轉時以欲為增上而他則不然故其餘亦與此同理然以某法有力而使諸非色法轉則彼法於彼等非色法為所緣增上故本文云凡以如如諸法為主而如如諸法即諸心心所法生則如是如是諸法於如是如是諸心心所法由增上緣為緣無間緣依於無間而助成之法為無間緣依於等無間而助成之法為等無間緣此二緣雖多戲論然此處之要義如次凡眼識之次必意界意界之次為意識界等心之規則由於前前心之力而成立非於他也因是之故於各各自分之次對於所應之心生而可能使之生起者其法為無間緣故論曰無間緣謂眼識界及彼相應諸法於意界及彼相應諸法由無間緣為緣等無間緣無間緣即等無間緣何以故此處唯名稱有別如集與相續等如增語與訓釋之二等意義無別也雖諸阿闍梨思以事無間性故為無間緣時無間性故為等無間緣然此與論云於自滅盡定出者而非想非非想處善對於果等至由於等無間緣而為緣相違復次此處所言謂諸法之等起能力性尚未消失由修力而遮止之故令諸法於等無間不得生起此正為時無間性不存在之證明何以故謂由修力故於其處無時無間性此亦我等之所主張故無時無間性故而名為等無間緣不應道理故謂時無間性故為等無間緣但無執著彼等之宗義此處唯依名稱有別不依意義有別應作如是結論何故爾耶謂於此等無中間者為無間無餘地故全無間者為等無間也俱生緣自所生時依於俱生性於他而為助成之法為俱生緣如對於光之燈此由於非色蘊等有六種如本文言四非有色蘊相互由俱生緣為緣四大種相互亦然入胎剎那名之與色相互亦然諸心所法對於心等起諸色亦然四大種對於諸所造色亦然諸有色法對於諸非有色法或時由俱生緣而為緣或時由俱生緣而不為緣此正指心所依而言也相互緣使相互生起依於支持和合性質而助成之法為相互緣如相互支合之三杖此依色蘊等而有三種如本文言四非有色蘊由相互緣為緣四大種乃至入胎剎那名之與色由相互緣而為緣依止緣依於作住處作依止事而助成之法為依止緣如大地布帛之對於樹木繪畫等論云四非有色蘊相互由依止緣為緣如是與俱生所述為同理趣應知然此處第六部分云眼處對於眼識界耳鼻舌身處對於身識界及其相應諸法由依止緣為緣凡依止於某色而意界及意識界轉則彼色對於意界意識界及彼相應諸法由依止緣而為緣者斯有別矣親依止緣親依止緣云者且於此處作如次語以達其義依之而轉依於自果為所依止而不違拒者是為依止又如激之使惱而成激惱強力依止者為親依止此與強因緣因由之語同義故以強力因緣之性質而助成之法為親依止緣應知有所緣親依止無間親依止本性親依止三種此中有云施施受戒作布薩業尊重其事而省察之尊重前諸善行而行省察從靜慮出尊重靜慮而行省察諸有學者尊重進姓而行省察尊重清淨而行省察諸有學者從道出尊重其道而行省察依如是等論法且將所緣親依止與所緣增上似無區別而判別之蓋凡尊重某所緣而諸心心所法生則彼決定於彼等心心所法所緣之中為有強力者故但依應所尊重之義為所緣增上若依強力因由之義為所緣親依止應知如是判別無間親依止亦由前前諸善蘊對於後後諸善蘊由親依止緣為緣等論法與無間緣無區別者而判別之論母設置緣廣說中就無間緣文有眼識界及彼相應諸法對於意界及彼相應諸法由無間緣為緣等論法又就親依止緣文有前前諸善法對於後後諸善法由親依止緣為緣等論法為出親依止故雖有設置之別由其意義亦但一而已雖然於各自直接後起所應之心生起之可能性故為無間性後心生起時由前心有強力性故為無間親依止性應知譬如因緣等中之任何法倘若無者心亦得生如是無自無間心而心生起決定不成以故此為強力之緣蓋由於各自之無間直接在後生起適應之心者為無間緣由於強力之因由者為無間親依止緣此等區別應如是知復次本性親依止者所造之親依止為本性親依止名為所造者於自相續中生或已曾修習之信戒等或為時節食等或由具此本性之物而為親依止者為本性親依止不可混同所緣親依止無間親依止義此本性親依止者論云親依止於信而施施受戒作布薩業起靜慮起觀起道起通起等至親依止於戒聞施捨慧而施施乃至起等至其時信戒聞施捨慧對於信戒聞施捨慧由於親依止緣而為緣由是等理趣應知有多種類以上信等若正以本來性質故及由強力因由之義而為親依止則謂之為本性親依止前生緣依於自生於前而轉之性質而助成之法為前生緣此由於五門之所依所緣及心所依而有十一種如本文言眼處對於眼識界及彼相應諸法由前生緣為緣耳鼻舌身色聲香味所觸處對於身識界及彼相應諸法由前生緣為緣色聲香味所觸處對於意界彼相應諸法由前生緣為緣凡依止於某色而意界及意識界轉則彼色對於意界及彼相應諸法由前生緣為緣對於意識界及彼相應諸法或時由前生緣而為緣或時由前生緣而不為緣後生緣對於諸前生之色法依於支持之義而助成之非色法為後生緣如對於饞貪兒童身體求食之思故本文言後生之諸心心所法對於前生之此身由後生緣而為緣修習緣依於修習之義對於直接後法之德及強力性而助成之法為修習緣如於典藉等之豫習此由善不善及唯作證用而有三種如本文言前前諸善法對於後後諸善法由修習緣為緣前前諸不善法乃至諸唯作無記法對於後後諸唯作無記法由修習緣而為緣業緣所謂心加行者依作用性而助成之法是為業緣此由異剎那之善不善思及俱生之一切思而有二種如本文言善不善業對於異熟諸蘊及業果諸色由業緣為緣思對於諸相應法及彼等起諸色由業緣而為緣異熟緣依於不勤寂靜性對於不勤寂靜性而助成之異熟法為異熟緣此在轉變時對於心等起諸色及結生時對於業果諸色又常時對於彼相應諸法皆為異熟緣如本文言異熟無記之一蘊對於三蘊及諸心等起色由異熟緣為緣如是乃至結生剎那異熟無記之一蘊對於三蘊亦然三蘊對於一蘊亦然乃至二蘊對於二蘊及諸業果色由異熟緣而為緣諸蘊對於所依由異熟緣而為緣食緣依支持義於諸色非色而助成之四食為食緣如本文言段食對於此身由食緣為緣諸非有色食對於諸相應法及彼等起諸色由食緣而為緣又在問分亦言結生剎那諸異熟無記之食對於諸相應蘊及諸業果色由食緣而為緣根緣除女根男根依增上之義而助成之二十根為根緣此中唯眼等五根但對於諸非色法其餘對於諸色非色法為緣如本文言眼根對於眼識界耳鼻身根乃至對於身識界及彼相應諸法由根緣為緣色命根對於諸業果色由根緣為緣諸非有色根對於相應諸法及彼等起諸色由根緣而為緣又於問分亦言結生剎那之異熟無記諸根對於諸相應法及諸業果色由根緣而為緣靜慮緣除身之苦樂二受二種五識中依審慮義所助成者有善等別之一切七靜慮支為靜慮緣如本文言諸靜慮支對於靜慮相應諸法及彼等起諸色由靜慮緣而為緣又於問分亦言結生剎那之諸異熟無記之靜慮支對於諸相應蘊及諸業果色由靜慮緣而為緣道緣於任何處依誘導義所助成者有善等別之十二道支為道緣如本文言諸道支對於道相應諸法及彼等起諸色由道緣而為緣又於問分亦言結生剎那諸異熟無記道支對於諸相應蘊及諸業果色由道緣而為緣復次此等靜慮及道如其名於諸二種五識無因心中不可得應知相應緣依於所謂同一所依同一緣同一生同一滅之相應性而助成之非色法為相應緣如本文言四非有色蘊相互由相應緣而為緣不相應緣不依同一所依等性而助成之諸有色法對於諸非有色法又諸非有色對於諸有色由不相應緣而為緣此有俱生後生前生三種何以故有如是言謂俱生之諸善蘊對於諸心等起色由不相應緣而為緣後生之諸善蘊對於前生之此身由不相應緣而為緣然於無記句之俱生分別亦言結生剎那之諸異熟無記蘊對於諸業果色由不相應緣而為緣諸蘊對於所依所依對於諸蘊由不相應緣而為緣又前生由於眼根等之所依亦然應知如本文言前生眼處對於眼識乃至身處對於身識由不相應緣而為緣所依對於諸異熟無記唯作無記蘊所依對於諸善蘊所依對於諸不善蘊由不相應緣而為緣有緣由現在相由有性對於同法依支持義而助成之法為有緣以是而設置非色蘊大種名色心心所大種處所依之七種論母如本文言四非有色蘊相互由於有緣為緣四大種亦然入胎剎那名之與色相互亦然諸心心所法對於心等起諸色四大種對於諸所造色眼處對於眼識界身處色處乃至所觸處對於身識界及彼相應諸法由有緣為緣色處乃至所觸處對於意界及彼相應諸法由有緣為緣凡依止於某色而意界及意識界轉則彼色對於意界及意識界及彼相應諸法由有緣而為緣復次於問分亦設置俱生前生後生食根於俱生者由一蘊對於三蘊及諸心等起色由有緣而為緣等之理趣而廣說之於前生者由於前生之眼等而廣說之於後生者由對於前生之此身以後生之諸心心所為緣而廣說之又於食根者段食對於此身由有緣而為緣色命根對於業果諸色由有緣而為緣如斯廣說云無有緣諸等無間已滅之非色法依於自之直接後生之諸非色法與以轉生之餘地而助成者為無有緣如本文言等無間滅之諸心心所法對於現在之心心所法由於無有緣而為緣去緣同前云之非色法依其已去者而助成故為去緣如本文言等無間已去之諸心心所法對於現在之諸心心所法由於去緣而為緣不去緣諸有緣法即依其不去者而助成故應知為不去緣然於此處或為嚴飾教說或為教導所化說此二法恰如已說有因之二法更說因相應之二法以上略說二十四緣未甚明了依法及依時依種種類別及依緣所生應知所判別此中法判別者實於此等諸緣之中因緣為諸名及色法中為名法之一分所緣緣與施設及非有俱為所有名色法增上緣中俱生增上為名法之一分業靜慮道緣亦然所緣增上者堪為所謂一切主力之所緣法無間等無間後生修習異熟相應無有去緣唯為名法涅槃無所攝故亦可得謂名法之一分前生緣色之一分餘如所應為名色法以上先依法判別如是應知時判別者此中現在緣即為十有五過去即有五一依止二時三正經三時及離於時者實此等中因緣俱生相互依止前生後生異熟食根靜慮道相應不相應有不去以上十五緣但為現在法無間等無間修習無有去緣之五但為過去然業緣之一於現在過去任何二時皆為依止餘之所緣緣增上緣親依止緣此等三緣為經於三時者與施設俱涅槃所攝故亦有離於時者如是依時判別應知其他依種種類別及依緣所生二句其義當於廣說分說明之緣廣說分釋因緣廣說二今為依略說諸緣全部之順序將示廣說言因緣者謂諸因對於因相應諸法及彼等起諸色由因緣而為緣等此中所言因緣者依二十四緣中設置之次第而先引出第一應分別者之句於餘諸緣亦由此理趣引出第一應分別者而有所解答應知又為此處之句之關係於緣略說已略說所謂因緣者廣說之則曰因者對於因相應諸法及彼等起諸色由於因緣而為緣如是應知依此方法於全部諸緣所應分別之句與答其關係應知今於所言諸因者對於因相應之諸法之際不言對於因相應之諸法何故說言因者對於因相應之諸法耶為欲確立能緣及諸緣所生故何以故言對於因相應之諸法時可得謂為對於因及相應之諸法由因緣而為緣之義假若如是則如斯如斯名法由因緣而為緣則能緣之決定為不可知復次因及相應之諸法即不作因相應之諸法之解釋而亦可得為因者對於凡相應法由因緣而為緣之義假若如是則與因不相應之眼識等及與因相應之善等同為相應法此際所云此因者對於如斯如斯名相應法為緣者其緣所生之決定為不可知故欲為決定能緣及緣所生而言因者對於因相應之諸法此義蓋謂對於因相應之善等諸法而凡為所相應之因者由於因緣而為緣也此處又不言緣而言由於因緣者為遮由因他之緣性何以故此因既由於因緣亦由於俱生等緣而為緣故此處為欲遮因之由於俱生等他之緣性故言由於因緣耳又復如是不言對於彼相應之諸法何故說言對於因相應之諸法耶為應廣說者之未明故也何以故若言對於彼相應之諸法時彼等所言為彼相應法彼實為是而於應廣說者未明今欲明其所指故諸法與孰相應故將彼相應之諸法之言具體正示故言對於因相應諸法也對於彼等起之諸色云者此處以應廣說者已明顯是故言彼也此義如是彼等之因與因相應諸法皆得對於此等色為等起起因者故彼等起之諸色即為彼等對於彼等起之諸色也有對於由因及由因相應諸法而生者之意由此而言心等起之色然則此由心以外而亦等起耶然也亦為等起何以故一切心心所各能使色等起故然依世間說心勝性故言斯類色為心等起正以此故而言諸心心所法對於心等起諸色由俱生緣而為緣又若如是此處亦言對於彼等起之諸色何故不言對於心等起之諸色耶為亦攝諸非心等起之色故也何以故問分有云結生剎那諸異熟無記因對於諸相應蘊及諸業果色由因緣而為緣故為攝此故此處不言對於心等起之諸色而言對於彼等起之諸色也此義云何謂此等之因及因相應法雖心生色不生由俱生等緣而對於此等為等起因即於彼等起之諸色此等為對於彼等起之諸色也對於轉時之諸心生色及結生時之業果諸色因由於因緣而為緣也其他有云對於彼等起之諸色之地位由此方法可知其義然則此因何故但於結生時對於諸業果色由因緣而為緣於轉時則不爾耶以結生時諸業果色為心繫屬轉性故何以故結生之時諸業果色隨心繫屬而轉由於心力而生而住故也於其剎那心雖不能使心生色生然若無心則此等業果色亦不能生不能住正為此故說緣於識而有名色此識住時有名色入胎然於轉時雖亦有心而此等業果色之轉全為業繫屬故而非心繫屬故然又於入滅盡定之人已是無心其時亦仍有業生色生也然則何故於結生剎那而心不能使心生色生耶業力所引性故無安住所依性故及無力性故也此為其時由業力而引生者無前生之所依故因而若無安住所依是為無力恰如危崖墮落之人任何事業亦不能為不能使生色者亦復如是雖然業生色對於心正在心等起色之位置又心對於業生色在種子之位業之對於業生色如田地煩惱如水如雖有田地及水然在初生時由種子力而樹木生在結生剎那由心力而色身生亦復如是已離種子之時更由地水之力而漸漸長成雖無心但由業而諸業果色轉者如是應知又所謂業如田地識如種子渴愛如溼潤云然又此義由於容有而可理解有三容有即名容有色容有名色容有故此中無色有曰名容有何以故若於其處雖無色緣唯心所依但生諸非色法故無想有曰色容有何以故若於其處雖無非色緣唯結生心但生諸色法故五蘊有曰名色容有何以故若於其處結生之時雖唯無所依諸非色法不生又雖無結生心業生諸色法不生以聯合故但諸色非色法生譬如有主人有王有門衛之家在初雖無王命則不得入在後雖無王命由於最初命令之力而得入正以如是於五蘊有無結生識之俱生等緣性由結色生而初生者決定非有然於後時雖無結生識之俱生等緣力已得入之色以前力之影響但由於業而轉也又無想有以無非色容有故於其處無非色緣而非想容有性故色之轉生恰如人入於無主之空家或自家也無色有以亦無色容有故於其處全無色緣知容有性故諸非色法轉然而五蘊有若色非色容有則於此處無非色緣則結生剎那不生諸色如此之因於結生時唯於諸業果色為緣而於轉時則不爾也又因若言對於諸俱生由因緣而緣時為全有此義耶若然何故言對於因相應諸法及彼等起之諸色耶為否定對於轉時之業果色等為緣也何以故若如是者凡於轉時對於因與同一剎那所生諸業果色並時節食等起色亦應言以因為因緣然因之對於彼等則非為緣是故為否定對於彼等之緣性而云然也應知今將所謂依種種類別及依緣所生之句於此處判別之依種種性類別者實謂此因依種類有善不善異熟唯作之四種此中善因依地不同有欲界繫等四種之別不善因唯欲界繫異熟因有欲界繫等四種之別唯作因者欲界繫色界繫無色界繫之三種此中欲界繫善因者謂無貪等三種色界繫等善因亦同此理趣不善因者為貪等三種又異熟因唯作因者於無貪等各各有三然為與各各心相應於各各諸因有種種性類之別是故先於此處依種種性類而判別應知依緣生者謂依此緣而此等諸法生謂對於此等諸法確以此為緣如是判別義可了解此中先就因緣言欲界繫之善因者於欲有色有對於自與相應諸法及諸心等起色為因緣於無色有則唯對於諸相應法色界繫善因者於欲有色有則唯對於諸相應法並心等起諸色為因緣無色界繫善因等於欲界繫善因非所攝善因亦爾不善因亦爾然欲界繫異熟因者於欲有則唯對於自與相應諸法對於結生時諸業果色又對於轉時心等起諸色皆為因緣又色界繫異熟因者對於色有所謂性類唯為因緣又無色界繫異熟因者對於無色有之諸相應法唯為因緣非所攝異熟因者於欲有色有對於諸相應法並對於心等起諸色於無色有對於諸非色法皆唯為因緣又三地之唯作因其緣之理趣等於善因此處之依緣所生判別如是應知所緣緣廣說三今就所緣緣廣說之云色處者色之處也餘亦與此同理云對於眼識界者對於眼識之界也餘亦與此同理云對於彼相應諸法者為對於與彼眼識界相應之受想行三蘊復對於全以淨眼為所依之受想行識四蘊其色處由所緣緣而為緣之義也此後亦與此同理云對於意界者為對於相應法之三種意界色等之五由所緣緣而為緣然亦非所論於一剎那也云一切諸法者為此色處等五及餘全體之所知法對於除此等六界眼識界乃至意界外餘相應法之意識界由所緣緣而為緣之義也云凡緣如如之法者謂凡對於此等七識界為所緣法者此等法對於彼等七界為所緣由是而七界生於其剎那對於七界名為所緣緣雖然此非全體也謂一一緣於某法而一一諸某法生則一一之諸法對於一一之諸法各別為所緣緣亦可知矣所言生者如言川流山峙含一切時而為斯言應知復由於是而成立所謂緣於某諸法而某諸法已生或當生此等亦皆正由所緣緣而已生或當生所云諸心心所法者為具體指示所言如如之諸法者也云如是如是諸法者者為一一之諸所緣法云於如是如是諸心心所法者為對於一一之諸心心所法也先將此處之本文註釋如是復次此所緣云者若以色所緣聲香味所觸法所緣分類則為六種除此中施設之餘依地則為欲界繫乃至非所攝之四種此中欲界繫者以善不善異熟唯作及色之別為五種色界繫者以善異熟唯作為三種無色界繫亦爾非所攝者以善異熟涅槃為三種或其全體以善不善異熟唯作色涅槃施設等別為七種此中善者依地別為四種不善者唯欲界繫異熟者四地唯作者三地色為一地但欲界繫涅槃亦一地為非所攝施設則離地此中種種性類如是判別應知然如是分別此所緣中欲界繫善所緣對於欲界繫善色界繫善及不善欲界繫異熟欲界繫唯作及色界繫唯作對於是等六聚由所緣緣而為緣色界繫善所緣對於是等六聚中除欲界繫異熟之餘五聚為所緣緣無色界繫善所緣對於欲界繫善色界繫善無色界繫善及不善無色界繫異熟欲界繫唯作色界繫唯作及無色界繫唯作對於是等八聚為所緣緣非所攝善所緣於欲界色界者唯對於善及唯作為所緣緣不善所緣對於欲界繫善色界繫善及不善欲界繫異熟欲界繫唯作色界繫唯作對於是等六聚為所緣緣欲界繫異熟所緣者對於欲界繫善色界繫善及不善欲界繫異熟欲界繫唯作色界繫唯作對於是等六聚為所緣緣色界繫異熟所緣對於欲界繫善色界繫善及不善欲界繫唯作色界繫唯作對於是等五聚為所緣緣無色界繫異熟所緣亦對於如是等五聚為所緣緣非所攝異熟所緣於欲界色界者唯對於諸善及唯作為所緣緣欲界繫唯作所緣對於欲界繫善色界繫善及不善欲界繫異熟欲界繫唯作及色界繫唯作對於是等六聚為所緣緣色界繫唯作所緣對於是等六聚中除欲界繫異熟之餘五聚為所緣緣無色界繫唯作所緣對於是等五及無色界繫唯作如是六聚為所緣緣四等起色蘊之色所緣對於欲界繫善色界繫善及不善欲界繫異熟欲界繫唯作色界繫唯作對於是等六聚為所緣緣涅槃所緣對於欲界繫善色界繫善非所攝善及異熟欲界繫唯作及色界繫唯作對於是等六聚為所緣緣或有色界繫善及唯作是非所許者其理可知然一一種類之施設所緣對於三地之善及不善色界繫異熟無色界繫異熟三地之唯作對於是等九聚為所緣緣此中一一所緣對於一一諸法為緣則一一諸法為一一之緣所生此中判別緣生如是應知增上緣廣說四增上緣廣說云欲增上者名欲為增上於以欲為首以欲為主而心生起之時欲如是作之欲望之名是也餘三增上理趣亦與此同然則何故如因緣廣說所言因者對於因相應諸法而此處不言增上者對於增上相應諸法乃以欲增上者對於欲相應諸法等之論法為說耶然一剎那間無有故何以故前之論法二三個因於一剎那亦為因緣依於根義而不捨助成之性質故也然增上者若依最勝義而助成則於一剎那間無有多個最勝者是以雖為合一而生起然彼等於一剎那間無增上緣之性質以此增上緣性於一剎那無有故此處作如是說如是已說俱生增上所緣增上以以如如之法為主等文為始今當說此中云如如之法者為一一之某所緣法也以為主者尊重之尊敬之或賞味之或鄭重之以為重要當得不當捨及不可侮者也如是如是諸法者謂應以為主之彼彼諸法也對於如是如是諸心心所法者對於以彼彼為主之諸法也由增上緣者由於所緣增上緣而為緣也此為本文之註釋然此名為增上者分俱生及所緣二種此中俱生者為欲等四種一一依欲界繫等地而為四種此中欲界繫者為善不善唯作三種然此處得不善者不得觀增上色界繫無色界繫者為善及唯作二種非所攝者為善異熟二種又所緣增上依性類之別有善不善異熟唯作色涅槃之六種以上判別種種性類如是應知然如是分別俱生增上之中初稱欲界繫善唯作之增上者於二因三因心生以欲等之隨一為主而生起時對於與自相應諸法並心等起色為增上緣於稱色界繫善唯作者理趣亦與是同然此究全一向可得何以故彼等色界繫諸法無俱生增上則不生故稱無色界繫善唯作者若五蘊有全等於色界繫增上而四蘊有對於諸相應法但為增上緣於其生起之欲界繫增上亦全爾也非所攝者若善若異熟於五蘊有完全一向對於諸相應法及心等起諸色為增上緣而四蘊有者唯對於色法不善增上者若於欲有之邪性決定心完全一向對於諸相應法及對於心等起諸色為增上緣不定者在欲有色有於自之增上時同對於彼等心等起色及相應法於無色有但對於諸非色法為增上緣是為於初俱生增上之理趣也然所緣增上中欲界繫善之所緣增上者對於欲界繫善對於貪俱行不善對於此等二聚為所緣增上緣在色界無色界其善所緣增上理趣亦與此同非所攝善之所緣增上者若在欲界對於智相應善並對於智相應唯作為所緣增上緣又所稱不善之所緣增上者若謂貪俱行心生則但對於貪俱行不善為所緣增上緣又欲界繫之異熟所緣增上者唯對於貪俱行不善為所緣增上緣色界無色界繫異熟所緣增上亦爾出世間之異熟所緣增上者若在欲界唯對於諸智相應之善唯作為所緣增上緣又別有欲界繫等之三種唯作所緣增上亦對於貪俱行不善為所緣增上緣稱四等起色之色蘊所緣增上者唯對於貪俱行不善為所緣增上緣涅槃若在欲界者對於智相應善對於智相應唯作對於出世間善對於出世間異熟對於此等四聚為所緣增上緣判別緣生如是應知無間緣廣說五無間緣廣說中云對於意界者對於異熟之意界也云對於意識界者對於推度作用之無因異熟意識界也又復由此更得說為建立證用彼所緣有分作用之意識界雖無此等言然由此理趣可知以略說示理趣於前前諸善法等六理趣攝是等故於此應知此中前前諸善法云者亦於六門可作無間直前之過去諸善證用法觀對於後後諸善法云者即對於無間直後所生諸法也對於諸善法云者對於相等之諸善法也對於諸無記法云者若於善之無間此以得彼所緣有分果而言者也在以不善為根言對於諸無記法者與對於所謂彼所緣有分之諸法相同在以無記為根云對於諸無記法者為對於由向轉證用或由有分而轉之諸唯作異熟無記法也從唯作意界出發乃至至於建立作用之意識界止就其轉時之經路心亦得與此理趣相同云對於諸善法者若在五門為對於建立之無間直後最初之諸證用若在意門為對於意門向轉之無間最初之諸證用也於對於諸不善法之句理趣亦與此同云對於如是如是諸法者又為一切無間緣法之畧相也以上為註釋此處之本文然此名為無間緣者除涅槃外正為四地非色法聚應知其關於性類者由善不善異熟唯作之別分為四種此中善者由欲界繫等別為四種不善者唯為欲界繫異熟者屬於四地又唯作無間緣屬於三地以上由種種性類之別如是判別應知於如是分別中欲界繫善者對於與自相等之欲界繫善為無間緣若智相應之欲界繫善對於色界繫善對於無色界善及對於出世間善以上對於此等三聚為無間緣欲界繫善對於欲界繫異熟對於色界繫異熟對於無色界繫異熟及對於出世間以上對於此等四聚為無間緣色界繫善對於色界繫善對於與智相應之欲界繫異熟及對於色界繫異熟以上對於三聚為無間緣無色界繫善亦然對於此等二異熟及對於自善對於異熟以上對於四聚為無間緣他若此中非想非非想處善對於名為不還果之出世間異熟亦為無間緣出世間善唯對於出世間異熟為無間緣不善亦然對於不善並對於善異熟不善異熟他若此中樂受相應中性受相應之不善者亦對於色界繫無色界繫異熟以上對於此等四聚為無間緣欲界繫異熟對於欲界繫異熟智相應或智不相應異熟對於欲界繫唯作向轉若此中智相應異熟亦對於由結生所生之色界繫無色界繫異熟以上對於此等四聚為無間緣色界繫異熟對於有因欲界繫異熟對於色界繫異熟對於無色界繫異熟及對於欲界繫唯作向轉以上對於此等四聚為無間緣無色界繫異熟對於三因欲界繫異熟對於無色界繫異熟及對於欲界繫唯作向轉以上對於此等三聚為無間緣出世間異熟對於三因欲界繫異熟及對於色界繫無色界繫出世間異熟以上對於此等四聚為無間緣欲界繫唯作對於欲界繫善對於不善對於四地異熟及對於三地唯作以上對於九聚為無間緣色界繫唯作對於三因欲界繫異熟對於色界繫異熟及對於色界繫唯作以上對於三聚為無間緣無色界繫唯作對於三因欲界繫異熟對於色界繫無色界繫出世間異熟及對於無色界繫唯作以上對於五聚為無間緣判別緣生如是應知等無間緣廣說六等無間緣廣說全與無間緣同趣唯此二緣作廣大說是故若於一切心之生起而精察之則此等所廣說者可得而理解也俱生緣廣說七俱生緣廣說中云相互者謂他對於他也因顯此等二法於同一剎那為能緣者及為緣所生者也云於入胎剎那者在五蘊有之結生時也何以故於此剎那而名色之來猶如飛躍從他世而來此世生也如入故此剎那謂之入胎剎那此際云色者意為心所依而已何以故此之與名名之與此相互滿足俱生緣義故也云諸心心所者轉時之四蘊也云由俱生緣者此中心等起諸色對於諸心心所未滿足能緣之義故不置相互之言諸所造色對於四大種亦如之諸有色法對於諸非有色法云者心所依對於四蘊也某時云者於若干時也云由俱生緣而為緣者指結生時言云由俱生緣而不為緣者指轉時言然此四非有色法相互由俱生緣而緣云者由六類建立其中三類言相互三類不言相互此中最初部類非色即為能緣且緣所生第二為色第三為名與色第四非色為能緣而色為緣所生第五若能緣若緣所生為色第六色為能緣非色為緣所生以上為此處本文之註釋然此俱生緣以性類之善不善異熟唯作色分為五種此中之善依地為四種不善唯一種異熟四種唯作三種色唯欲界繫一種於此中種種性類之殊判別應知復次如是類中四地之善任何五蘊有對與相應諸法並心等起色為俱生緣不善亦如之復次此中若凡生於無色界者唯對於非色法為俱生緣欲界繫色界繫異熟對於心等起色並諸相應法為俱生緣再於此中凡非等起色唯對於諸相應法凡結生時所生者對於諸業果色為俱生緣無色界繫異熟唯對於諸相應法出世間異熟其五蘊有者對於諸相應法並對於心等起諸色其四蘊者唯對於非色欲界繫無色界繫唯作其五蘊有者對於諸相應法並對於心等起諸色為俱生緣其四蘊者唯對於諸非色色界繫唯作對於諸相應法並對於心等起諸色一向為俱生緣四等起色中之業等起色一大種對於三三對於一二對於二大種四大種對於所造色為俱生緣欲界色界結生剎那之所依色對於諸異熟蘊由俱生緣而為緣然於時節心食等起色其四大種相互並對於所造色由俱生緣而為緣如是判別緣生應知相互緣廣說八相互緣廣說之本文已由俱生義廣說之前三類示知對此註釋因與彼所述完全相同故不復說又此相互緣亦由性類之善不善異熟唯作色別為五種此中善者依地分為四種一切全等於前如此判別種種性類應知復次如是分別此中一切四地之善亦對於與自相應諸法由相互緣而為緣不善亦如之然於異熟若欲界繫異熟色界繫異熟在結生時者對於所依色在轉時唯對於諸相應法無色界繫異熟出世間異熟唯對於相應諸法由相互緣而為緣一切唯作亦唯對於諸相應法由相互緣而為緣於四等起色中之業等起則一大種對於三三對於一二對於二大種由相互緣而為緣於欲界色界之結生所依色對於諸異熟蘊由相互緣而為緣於諸時節心食等起色則四大種對於相同之四大種由相互緣而為緣以上判別緣所生如是應知依止緣廣說九依止緣廣說者由俱生緣廣說之前五類而示俱生依止之理趣再為由第六類而說前生依止之理趣故以眼處對於眼識界等文為始此中依止於某色者指所依色言何以故依止於彼而除三種意界與無色異熟而上七十五心與七十二種意識界轉故也上為此處註釋本文此依止緣亦由性類善等別分為五種此中善者依地四種不善唯一種異熟四種名為唯作者三種色唯一種此為判別種種性類應知然如是分別中四地之善其任何五蘊有對於諸相應蘊並對於心等起色由依止緣而為緣不善亦如是然此中凡在無色界生者唯對於諸非色法為依止緣欲界繫色界繫異熟轉時對於諸相應法並對於心等起色在結生時對於業果色亦由依止緣而為緣無色界繫異熟唯對於相應諸法出世間異熟其五蘊有者對於諸相應法並對於心等起色其四蘊有者唯對於非色為依止緣欲界繫色界繫唯作之五蘊有者對於諸相應法並對於心等起色為依止緣其四蘊有者唯對於諸非色色界繫唯作之五蘊有者對於諸相應法並對於心等起色一向為依止緣四等起色中於業等起色一大種對於三三對於一二對於二大種四大種對於諸所造色所依色之五蘊有者對於四地之善對於不善對於除無色異熟及二種五識之餘三地異熟對於三地唯作以上對於此等四法聚為依止緣眼處等五對於與相應俱之眼識等為依止緣於時節心食等起者若四大種對於四大種並對於所造色由依止緣而為緣如是亦於此處判別緣生應知親依止緣廣說一於親依止緣云前前諸善法者若在無間親依止為於等無間過去諸法之謂若在所緣親依止本性親依止就種種經路之次前諸法之謂也在由於善而善生云之句雖此等三聚皆可能在由於善而不善生之句則於等無間過去諸法為不適當是故作此言對於若干之不善法由親依止緣而為緣云所以問分如是言善法對於不善法由親依止緣而為緣所緣親依止本性親依止所緣親依止者施施受戒作布薩業尊重彼故味著歡喜尊重彼故貪生見生尊重前之諸善行味著歡喜尊重彼故貪生見生從靜慮出尊重靜慮味著歡喜尊重彼故貪生見生本性親依止者親依止於信而語慢執見親依止於戒聞施捨慧而語慢而執見信戒聞施捨慧對於貪瞋癡慢見及欲願由親依止緣而為緣指此理趣而言者也在由善法而無記法生之句則三聚亦皆可能在由不善法而不善法生之句亦然若在由不善法而善法生之句則等無間過去諸法為不適當是故本文言對於若干善法由親依止緣而緣云又云不善法對於善法由親依止緣而為緣本性親依止者親依止於貪而施施受戒作布薩業起靜慮起觀起道起通起等至親依止於瞋癡慢見欲願而施施乃至起等至如是貪瞋癡慢見欲願對於信戒聞施捨慧由親依止緣而為緣殺生物已為避彼而施施等由此理趣故問分指本性親依止以立言復次不善對於善非為所緣親依止何以故若重不善不轉為善故如無間親依止所緣親依止亦於此際不可得應知在由不善而無記生句所緣親依止決不可得何以故諸無記法不重不善故然得有無間性故於此處不置對於若干之言若於由無記而無記善不善之三論法則三親依止正俱可得云補特伽羅及牀座此二者就本性親依止而為言何以故此二者對於善不善之起成強力之緣故也然此等緣性此處依經所說應知此為本文之註釋然此名為親依止緣者與一分施設俱一切四地之諸法也若分別之則為所緣親依止等三種此中所緣親依止者與所緣增上無別故可由前所述之理趣就種種之性類而理解之無間親依止者與無間緣無別此亦正可由前所述之理趣就種種性類而理解之因此由彼處所述理趣而判別緣所生亦可了知然本性親依止者其性類有善不善異熟唯作色之五種更依善等地別分為種種此處判別種種性類如是應知復次於如是分別中三地之善對於四地之善對於不善對於異熟對於唯作對於以上四聚悉為本性親依止出世間唯對於不善為非本性親依止然云我等為阿闍梨故已得成就出世間法由此理趣對於他人之不善為本性親依止凡對於某人將生無上解脫而起嫉由此理趣正為本性親依止又不善之對於一切四地諸蘊為本性親依止三地異熟亦然若於出世間異熟下之三果唯對於不善為非本性親依止最上果對於善亦非為本性親依止然由前理趣而對於他人或某人之於相續中將生一切出世間異熟對於一切善等之非色蘊等為本性親依止名為唯作者亦對於四地不善等蘊同為本性親依止名為色者亦然然色依此發趣大論所表之理趣不得為親依止緣唯依經所說不可不言得也又於此處判別緣生如是應知前生緣廣說一一前生緣廣說云前生緣者此處所名前生對於某物而為緣亦由彼正生在前經生之剎那而達於住之剎那者也眼處等者由所依前生而說色處等者由所緣前生而說或時由於前生緣者指轉時而說或時非緣者指結生時而言也如是五門之由於所依及所緣雖已全述意門之由於所依此之本文完全未述然於問分云所緣前生者謂諸有學或異生從無常苦無我觀眼有所述故是於意門亦正得所緣前生此處作說留有餘地耳是為此處本文之註釋然此前生緣者即唯純色其實又不外經生之剎那而達於住之十八種壞色而已此等又有所依前生所緣前生之二種此中眼處乃至身處所依色者名為所依前生其餘於此本文或述或不述即色聲香味四界三根段食之十二種色名為所緣前生此處種種性類之殊如是判別應知然此如是分別之中眼處者對於二種眼識由前生緣而為緣其他之四處對於二種耳識等亦如是若所依色者除二種五識及四無色界繫異熟對於餘之一切四地善不善無記心心所法為前生緣又色等之五所緣對於二種五識並對於諸意界一向為前生緣又此十八種壞色對於欲界繫善若在色界對於通善對於不善對於彼所緣之欲界繫異熟對於欲界繫唯作及在色界對於通唯作對於以上六聚為前生緣如是判別緣生應知後生緣廣說一二後生緣廣說中云後生者凡對於身之諸緣其身生已而生住時者也對於前生云云者為由彼等之生起對於自初生經生之剎那而達於住者也對於此身者為對於名此為四等起三等起大種所造色之身也又此處云三等起之身者無食等起故為梵眾天等之身應知以上為本文之註釋然此名為後生緣者略言之則為除無色界繫異熟餘四地之非色蘊也其為性類由善不善異熟唯作之殊別為四種如是判別種種性類應知然如是分別之中於五蘊有而生之四地善及不善者對於經生之剎那而達於住之四等起三等起之色身為後生緣其於異熟亦除結生異熟外餘之欲界繫色界繫異熟對於其相同者一向為後生緣於五蘊有而生之出世間異熟亦對於其相同者為後生緣於五蘊有而生之三地唯作亦對於曾所述性類之身同為後生緣如是此處判別緣生應知修習緣廣說一三修習緣廣說所云前前之諸法者就全理論可與等無間過去法同觀然則此處何故不如無間緣由前前之諸善法對於後後之諸無記法等之理論所分別之性類俱廣說耶蓋不能使取自趣故也所以者何不能同於於無間緣所分別之性類對於所分別之性類由修習之德使完成熟練強力之性質且使取自善等性之趣是故不與彼等俱廣說應知凡由名為習氣之修習而以更熟練更強力之殊勝性即得使取名為自善等性之趣與彼等及同性類俱廣所說異熟無記何故不說以非修習故所以者何異熟為由業而得異熟性者業所迴向而轉不勤無力也此則由修習之功德使得自性使其成滿而決不能使生他異熟又亦非得前異熟之力而生者復次業力所引如於險崖下落而生在異熟全無所謂修習義由修習無故不言異熟也又此雖為於善不善唯作無間生者然繫屬於業而轉故不取修習之德則雖對於善等亦非修習緣又此等亦決無異種性又依地依所緣亦決無異種性故欲界繫善唯作對於大善唯作又以行為所緣之隨順善對於以涅槃為所緣之進姓地善正為修習緣此為本文之註釋然此修習緣所謂性類有善不善唯作無記三種此中善者依於地有欲界繫色界繫無色界繫三種不善者唯欲界繫唯作無記者同為欲界繫色界繫無色界繫之三種出世間者無所謂修習緣此處判別種種性類如是應知且如是分別之中欲界繫善對於自之無間同欲界繫善復於此中凡與智相應者對於與自相等受之色界善對於無色界善對於出世間善對於以上諸聚為修習緣復次色界繫善唯對於色界繫善無色界繫善唯對於無色界繫善又不善唯對於不善為修習緣復次在於唯作者其欲界繫唯作先唯對於欲界繫唯作又於此中凡與智相應者對於與自相等受之色界繫唯作對於無色界繫唯作對於以上諸聚為修習緣其色界繫唯作唯對於色界繫唯作其無色界繫唯作唯對於無色界繫唯作為修習緣然異熟之對於一法或任何一法之對於異熟亦非修習緣此處判別緣生如是應知業緣廣說一四業緣廣說所云業者即思業也云對於業果諸色者對於因作業而生之諸色也云由於業緣者因隔幾千萬劫亦得生其自果由於異剎那之業緣之義也何以故善不善業於自轉之剎那不與果故若與果者設人作當升天界之善業由其力故實於此剎那當成為天復次於此剎那所作在異剎那雖全不知但以所作故或即現法或於後世與餘緣相應時生果恰如已滅前之工巧等所作之於隔時後之工巧等所作以是故言由於異剎那之業也云思對於諸相應法者為任何思對於與自相應之諸法也云對於彼相應法等起諸色者亦謂結生剎那之業果色也云由於業緣者指此俱生之思而言也何以故善等中之任何俱生思對於餘之諸法亦依名為心加行之作為性而助成之者故也是故謂之俱生業緣是為此處本文之註釋然此業緣其義正為四地之思依性類之異分為善不善異熟唯作之四種此中善者依地分為欲界繫等四種不善唯一種異熟為四種唯作但為三種以上判別種種性類如是應知如是所分別中俱生之欲界繫善思其五蘊有者對於與自相應諸法並對於心等起色其四蘊有者唯對於與自相應諸蘊由俱生業緣而為緣又生而滅者對於自之異熟及業果諸色由於異剎那業緣而為緣然此但於五蘊有為然非於他處俱生之色界繫善思對於與自相應諸法並對於諸心等起色一向由於俱生業緣而為緣又生而滅者對於自之異熟及諸業果色由於異剎那業緣而為緣又無色界繫及出世間之俱生善思於五蘊有者對於與自相應諸法並對於心等起諸色於四蘊有者唯對於與自相應諸蘊由俱生業緣而為緣又生而滅之此等二種之思亦唯對於各自之諸異熟蘊由異剎那業緣而為緣俱生之不善思於五蘊有者對於與自相應諸蘊並對於諸心等起色於四蘊有者唯對於諸非色蘊由俱生業緣而為緣又生而滅之思對於諸異熟蘊並對於諸業果色由異剎那業緣而為緣在欲界色界異熟之思對於與自相應諸法於轉時對於諸心等起色及結生時對於諸業果色由俱生業緣而為緣無色界繫異熟思唯對於與自相應諸法由俱生業緣而為緣出世間異熟思於五蘊有者對於與自相應諸法並對於心等起色於四蘊有者唯對於非色由俱生業緣而為緣三地唯作思於五蘊有者對於諸相應法並對於心等起色由俱生業緣而為緣然此中凡生於無色者唯對於諸非色法由俱生業緣而為緣於此處判別緣所生如是應知異熟緣廣說一五異熟緣廣說云異熟之四蘊者雖為由業等起色然非為異熟故言異熟之而又言四蘊也此之本文但就對於諸非色法之異熟緣言傳說如是然於問分有云異熟無記之一蘊對於三蘊及諸心等起色由異熟緣而為緣乃至結生剎那異熟無記之一蘊對於三蘊及諸業果色由異熟緣而為緣故對於諸心等起業等起色亦得為異熟緣唯此處所說留有餘地耳以上為本文之註釋然此異熟緣者依異熟者之性類則為一種依地別者由欲界繫等分為四種此處判別種種性類如是應知雖如是分別然欲界繫色界繫異熟對於與自相應諸法若轉時對於諸心等起色若結生時對於諸業果色為異熟緣無色界繫異熟唯對於諸相應法出世間異熟於五蘊有者對於諸相應法並對於心等起色於四蘊有者但對於諸相應法為異熟緣以上判別緣生如是應知食緣廣說一六於食緣廣說云段食者於四相續等起色之營養名之為食但作為分段而吞咽者為食之作用在外者則不作故不言食而言段食也或因作為分段而後可為食事則段之名但為食專名矣云非有色食者為觸思識食也云對於彼等起諸色者亦但謂業等起色也何以故在問分有此言故云結生剎那異熟無記之三食對於相應之四蘊及諸業果色由食緣而為緣以上為本文之註釋然此食緣約之則為段食觸思識之四法此中除段食外餘之三非色食依性類而別為善不善異熟唯作之四種復依地別善為四種不善一種異熟四種唯作三種如是分別若段食依性類為無記依地唯欲界判別種種性類如是應知然雖如是分別四地之三善食於五蘊有者對於與自相應諸法並對於心等起色由食緣而為緣除色界繫餘於無色者唯對於諸相應法由食緣而為緣於諸不善食理趣亦與是同復次四地之諸異熟食對於遍諸相應為食緣然而欲界繫色界繫異熟於五蘊有而生而轉時對於心等起色結生之時對於業果色亦為食緣出世間異熟但對於心等起色於無色界生者對於色非為緣復次三地之唯作食於五蘊有對於諸相應法並對於心等起色然欲界繫色界繫於無色者唯對於諸相應法由食緣而為緣四相續等起之段食如謂對於此身雖不為分別然分別之則對於食等起色為能生者並隨護者由食緣而為緣對於餘三相續等起之色但為隨護者由食緣而為緣又於此處判別緣生如是應知根緣廣說一七根緣廣說所云眼根者以眼為名之根也云由根緣者為自前生者對於諸非色法從生起乃至破壞止由根緣而為緣於耳根等理趣亦與是同於此處云諸非有色根者亦攝非色命根也於此處云對於彼等起諸色者依與前述相同之理趣亦攝諸業果色也何以故於其問分有說故云結生剎那異熟無記之八根對於相應之四蘊及諸業果色由根緣而為緣此處本文之註釋先應如是理解然此根緣者除女根男根正由二十根所建立何以故女根男根雖為女相男相之種子然在歌羅邏等時期不定有之無女相男相故彼等之對於彼等對於其他皆決不成滿根緣性何以故根緣若對於自存在剎那不分離諸法則無不成滿根緣事者是故彼等非為根緣雖然若對於某者而此等為種子則對彼等從經說方面則演為本性親依止之性根緣之正由二十根所建立者應知此由性類之善不善異熟唯作色分為五種此中善者依地別為四種不善者但欲界繫異熟為四種以唯作為名者有三種色者但欲界繫以上種種分別於此處判別種種性類先應如是知然雖如是分別四地之善根緣又於五蘊有者對於諸相應法並對於心等起色由根緣而為緣不善亦同復次除色界繫善餘之諸善不善於無色者但對於諸相應法由根緣而為緣四地之異熟根緣亦但一向對於諸相應由根緣而為緣然欲界繫色界繫異熟者於五蘊有生故於其轉時對於心等起色於結生時對於業果色亦由根緣而為緣出世間異熟者但對於心等起色於無色生之出世間異熟諸根對於色非為緣又三地之唯作根於五蘊有者對於諸相應法並對於心等起色然欲界繫色界繫之唯作於無色者唯對於諸相應法成滿根緣性於由眼根等之六種色根其眼根對於善不善異熟之諸相應法與俱之二種眼識耳根等亦對於其全相同種類之耳識等色命根對於與自俱生之諸色在住之剎那由根緣而為緣然於彼無俱生緣性如是於此處判別緣生應知靜慮緣廣說一八靜慮緣廣說云諸靜慮支者除二種五識餘心所生之尋伺喜快憂捨心一境性之七支是蓋五識身但有接觸故在彼等五識中之捨樂苦無審慮之相不取為靜慮支又於其處簡畧故餘之無因心中靜慮支亦復不取此處所取者正在法要約中也云對於彼等起諸色者此處亦攝業果色應知何以故在問分有斯言故云結生剎那異熟無記之四靜慮支對於相應四蘊及諸業果色由靜慮緣而為緣此為本文之註釋此靜慮緣雖由七靜慮支所建立依其性類亦分善不善異熟唯作四種復依地別分為四種一種三種及十二種此處判別種種性類如是應知然雖如是分別而四地之善靜慮支又於五蘊有者對於諸相應法並心等起色除色界繫餘無色界者唯對於諸相應法由靜慮緣而為緣不善亦同是理趣欲界繫色界繫異熟於轉時對於諸相應法並對於心等起色於結生時對於諸相應法並對於業果色無色界繫異熟唯對於諸相應法又凡生於無色界之出世間異熟亦然於五蘊有生彼出世間異熟對於心等起色亦由靜慮緣而為緣三地之唯作靜慮支亦於五蘊有者對於諸相應法並對於心等起色又此中凡生於無色界者但對於諸相應法由靜慮緣而為緣又於此處判別緣生應知道緣廣說一九於道緣廣說云諸道支者於除無因心生起餘心所生起之慧尋正語正業正命正精進正念正定邪見邪志邪精進邪定等十二支是然道緣為因之最後者故在無因心不舉諸道支云對於彼等起諸色者亦於此處同攝業果色何以故於問分言之故云結生剎那異熟無記之諸道支對於相應之四蘊及諸業果色由道緣而為緣是為此處本文之註釋然此道緣雖由十二道支所建立而於性類之別則有善等四種又善等依欲界繫等地之別分為十二種此處之種種性類判別應知然如是分別中四地之善道支又於五蘊有者對於諸相應法並對於心等起色除色界繫餘無色界者唯對於諸相應法由道緣而為緣以下應全如靜慮緣所廣說又於此處判別緣生應知相應緣廣說二相應緣廣說本文之義全體明了然此名為相應緣者畧言之則為任何無色蘊也若分別之則依其性類為善等又依地為欲界等之種種如是判別種種性類應知然於如是分別中四地之任何善蘊一蘊對於三蘊三蘊對於一蘊二對於二如是任何相互由相應緣而為緣於諸不善異熟唯作蘊其理趣亦與此同如是判別緣生應知不相應緣廣說二一不相應緣廣說云諸有色法對於諸非有色法者此先應就心所依及眼根等而理解之何以故諸色法正為此等六身分對於諸非色蘊由不相應緣而為緣然色處等諸所緣法設為不相應法然非不相應緣依云何因緣耶無相應疑故也何以故諸非有色蘊之生如從眼等所依之內部出故於其處有疑謂是等原與是等相應耶或不相應耶若諸所緣法對於依止所依而生者不過為所緣於彼等無相應疑因無相應疑故彼等則非不相應緣若唯於心所依等此之不相應緣性可知又於問分作斯言云所依對於善之四蘊由不相應緣而為緣所依對於不善之四蘊由不相應緣而為緣眼處對於眼識由不相應緣而為緣耳鼻舌身處對於身識由不相應緣而緣所依對於異熟無記唯作無記之四蘊由不相應緣而為緣云諸非有色法對於諸有色法者是則應由四蘊而理解之何以故諸非色法中四蘊正對於俱生前生之諸色法由不相應緣而為緣故也蓋涅槃雖非色法對於色非為不相應緣所以然者所謂與四相應與四不相應故也故唯四非色蘊為不相應緣應知又於問分作如是言云俱生者謂善之四蘊對於諸心等起色由不相應緣而為緣後生者謂善之四蘊對於前生之此身由不相應緣而為緣結生剎那異熟無記之四蘊對於諸業果色由不相應緣而為緣四蘊之於所依由不相應緣而為緣如是此處本文之註釋應先理解然此名為不相應緣者畧言之則為於五蘊有轉之諸色非色法也其中色者依所依及眼等分為六種非色者依於五蘊有所生之善不善異熟唯作分為四種依地別則有欲界繫等四種一種三種三種為十一種何以故無色界繫異熟非不相應緣故也此為判別種種性類應知然如是分別中又於五蘊有而生之四地善與不善對於使自等起之心等起色由俱生不相應緣為緣對於經生剎那而達於住剎那之前生四等起三等起色身由後生不相應緣而為緣此中三等起身者無食等起故為梵眾等之身應知然欲界繫色界繫異熟於轉時對於心等起色又於結生時對於業果色由俱生不相應緣而為緣出世間異熟唯對於心等起然此三種於前生之四等起三等起身亦由後生不相應緣而為緣三地之唯作對於心等起色亦由俱生不相應緣而為緣對於前生之四等起三等起身由後生不相應緣而為緣復次六種之住色中所依色之於結生剎那對於欲界繫色界繫異熟由俱生不相應緣而緣於轉時對於所生一一四地諸善不善對於二種五識對於三地異熟及對於三地唯作由前生不相應緣而為緣眼處等對於眼識等由前生不相應緣而為緣又於此處判別緣生如是應知有緣廣說二二有緣廣說云四蘊等者為由俱生廣說有緣眼處等者為由前生也此處云依止於某色者由俱生及前生而廣說有緣者也此之本文傳說但為由俱生前生之有緣耳然在問分傳說為由俱生前生後生食根等故亦由於後生食及根得成有緣但此處留有餘地而不說上述本文註釋如是然此名為有緣者為由相互及由非相互之二種此中相互者為非色與非色色與色色非色與色非色之三種此處云四非有色蘊者實就一切心生起而言非色與非色相互為有緣也此處云四大種者就一切相續等起色而為色與色也此處云於入胎剎那之名與色者就諸結生蘊及諸所依而言色非色與色非色相互為有緣也非相互者亦有非色與色色與色色與非色三種此處云諸心及心所法者實就五蘊有而言非色之對於色也此處云四大種對於諸所造色者就一切相續色而為色之對於色也眼處對於眼識界等者就所依及所緣而言色對於非色而為有緣也復次此名為有緣者略之則亦可言以三剎那所得之名與色及轉起一一五蘊也此由性類之別分為善不善異熟唯作色之五種此中善者有俱生後生二種不善異熟唯作亦如之此等中善者由欲界繫等分為四種不善唯欲界繫異熟四地唯作三地名為色之有緣者唯欲界繫更有由俱生及前生之二種此中五所依及所緣唯前生心所依者俱生或前生然於問分所傳說之食及根者不得俱生等之別此為種種性類判別應知然如是分別中四地之善亦為俱生有緣於五蘊有者由一蘊對於三蘊等之理趣相互對於諸蘊並對於心等起色復次於除色界繫善餘無色界俱生善唯對於諸相應蘊由有緣而為緣復次此四地後生之善於五蘊有者對於四等起三等起身為有緣於不善亦與是同理趣所以然者此俱生不善亦於五蘊有者對於諸相應蘊並對於心等起色又於四蘊有者唯對於諸相應蘊由有緣而為緣故也於五蘊有之對於四等起三等起身後生不善者由有緣而緣復次於異熟者欲界繫色界繫有緣必在結生剎那對於諸蘊並對於業果色由俱生有緣而為緣又在轉時對於諸相應蘊並對於心等起色由俱生有緣而為緣對於達於住之四等起三等起身由後生有緣而為緣然無色界繫異熟及生於無色之出世間異熟唯對於與自相應諸蘊由俱生有緣而為緣於五蘊有之出世間異熟對於與自相應諸蘊並對於心等起色由俱生有緣而為緣對於四等起三等起身由後生有緣而為緣屬於唯作者色界繫有緣對於諸相應蘊並對於心等起色由俱生有緣而為緣對於四等起三等起身由後生有緣而為緣復次欲界繫色界繫者於無色者唯對於諸相應蘊於五蘊有者對於心等起色亦由俱生有緣而為緣對於四等起三等起身由後生有緣而為緣復次名為色之有緣者有俱生前生食根之四種此中俱生色有緣者由於等起而有四種此中業等起俱生有緣謂一大種對於三大種三對於一二對於二四大種乃至對於諸所造色如是由俱生有緣而為緣結生剎那之所依色對於欲界繫色界繫之諸異熟蘊由俱生有緣而為緣此等之中又三等起色謂一大種對於三大種三對於一二對於二四大種乃至對於諸所造色如是由俱生有緣而為緣又前生有緣有所依前生與所緣前生二種此二種者以前生緣中相同理趣亦可解釋食有緣者以段食緣中相同理趣亦可解釋然今所云者為由於自不滅剎那之能緣性而為有緣色命根亦以根緣之色命根相同理趣而可理解然今所云者亦但由於自不滅剎那之能緣性而為緣此處判別緣生如是應知無有緣廣說二三無有緣廣說云等無間滅者由別心生起而為無間法而已於等無間滅者也對於現在之諸心心所法者對於諸緣所生法也蓋與此無有緣之餘地由於此義成立無有緣性何以故若由前者滅而不為後者與以轉之餘地時此等後者之緣所生事應無有故也是為此處本文之註釋餘者全與無間緣同其理趣應知何以故此中唯緣之說相有異而兩者之能緣及緣所生則無別故也但彼處以眼識界及彼相應諸法對於意界等之理趣而諸能緣及諸緣所生依於自體立說而在今所云等無間滅之諸心心所法對於現在之諸心心所法者由彼等之任何滅與生於一般而說也去緣廣說二四去緣廣說云等無間去者為已於等無間去盡者也謂去緣之由於此去已完性質而為緣然則無有緣之與此唯於言有別而於義無別也不去緣廣說二五不去緣廣說由於四蘊等之一切說相與有緣廣說同其理趣意義可解何以故此緣亦與有緣唯於言有別而於義無別故也今於如是略說廣說此等二十四緣為欲明其智用作雜判別十句一多法之一緣性二一法之多緣性三依一緣之多緣性四依緣同分五依緣非同分六依雙七依能生非能生八依一切處非一切處九依色對於色等之分別十依有之別一此中依多法之一緣性者於除業緣餘之二十三緣得多法共為緣故蓋業緣者但一思法如是多法之一緣性判別應知二依一法之多緣性者如因緣之無癡一法此唯前生業食靜慮緣由餘之二十緣而為緣無貪無瞋則更去根道緣由餘之十八緣而為緣貪癡更去異熟緣由餘之十七緣而為緣瞋更去增上緣由餘之十六緣而為緣所緣緣之色處對於眼識界由所緣前生有不去之四種緣對於意界及無因意識界亦爾然對於有因亦由所依增上所緣親依止而為緣由此理趣而一切諸所緣緣法之多緣性可知增上緣中諸所緣增上由所緣緣所述之理趣其多緣性可知於諸俱生增上緣觀者如無癡因為二十種緣欲者非因前生業食根靜慮道緣由餘十七緣而為緣心者非因前生業靜慮道緣由餘十九緣而為緣勤者非因前生業食靜慮緣由餘十九緣而為緣無間緣由眼識界者等之論法所說之四蘊受蘊非因前生業食道緣由餘之十九而為緣夢想蘊則更去根靜慮緣由餘之十七而為緣其於行蘊因者由於因緣所說之理趣欲勤者由於增上緣所說之理趣同而為緣觸者非因前生業根靜慮道緣由餘之十八而為緣思者非因前生根靜慮道緣由餘之十九而為緣尋者非因前生業食根緣由餘之十九而為緣伺者更去道緣由餘之十八而為緣喜者同由此等十八而為緣心一境性者更去因前生業食緣由餘之二十而為緣信者非因前生業食靜慮道緣由餘之十八而為緣念者由此等及道緣之十九而為緣命根者由信所說之十八而為緣慚愧者於此去根緣而由餘之十七而為緣身輕安等之諸雙亦爾於同類中有勝解作意處中性悲隨喜然離者由此等及道緣為十八種之緣邪見者又於其中去異熟緣而為十七種緣邪語邪業邪命者由此等及業食緣而為十九種緣無慚無愧慢惛沈睡眠掉舉等者去因前生業異熟食根靜慮道緣由餘之十六緣而為緣疑嫉慳惡作者更去增上緣而為十五種緣識蘊之多緣性者由與增上緣所述同其理趣可知等無間緣與無間緣同理趣俱生緣中四蘊一一法之多緣性者由於前所述理趣而可知四大種者由所緣所緣增上俱生相互依止親依止前生有不去為九種緣心所依者由此等及不相應為十種緣相互緣無新者依止緣中眼處等者由所緣所緣增上依止親依止前生根不相應有不去為九種緣親依止緣無新者前生緣中色聲香味處者由所緣所緣增上親依止前生有不去為六種緣是於此處為唯新者後生等緣無新者食緣中之段食由所緣所緣增上親依止食有不去為六種緣根等亦無新者如是由一法之多緣性判別應知三依一緣之多緣性者因緣等之任何一緣彼由某相由某義對於諸緣所生而為緣不捨此相此義而由他之諸相諸義於同剎那對於彼等諸法為多緣則依此多緣性其判別可知欲明其義如無癡為因緣仍不捨此因緣義又依增上俱生相互依止異熟根道相應不相應有不去因以外之十一相而為多緣無貪無瞋此中更去增上根道之三緣由餘八緣而為多緣是唯於諸異熟因得之諸善因唯作因則缺異熟緣性貪瞋癡者除彼等三及異熟四由餘而為多緣所緣緣者仍不捨此所緣緣義更依所緣增上依止親依止前生不相應有不去所緣以外之七相而為多緣此為精細分解則然蓋諸過去未來之諸非色法或諸色法有所緣緣性時以上所得者唯為所緣增上及所緣親依止耳增上緣中觀者等於無癡欲者仍不捨增上緣義依俱生相互依止異熟相應不相應有不去緣增上以外之八相而為多緣勤者更由此等及根道之十相為多緣心者更由於此等中除道緣加食緣之十相為多緣復次所緣增上者由前所緣緣所述之同理趣而成多緣應知無間等無間者無間等無間義又依親依止業修習無有去無間等無間以外之五相而為多緣此際唯聖道思得業緣性餘之諸法則不得焉俱生緣者仍不捨俱生緣義更依因增上相互依止業異熟食根靜慮道相應不相應有不去俱生以外之十四相而為多緣此為精細分解蓋此際若則所依俱生等則亦無因緣等應知於相互緣亦同理趣依止緣仍不捨依止緣義於二十四緣中除去自之依止緣義及無間等無間後生修習無有去之六而具其餘之緣依止以外之十七相而為多緣此為精細分解蓋此際若則所依依止等則無因緣等應知親依止緣中所緣親依止者等於所緣增上無間親依止者仍不捨無間親依止義依無間等無間業修習無有去緣親依止以外之六相而亦為多緣此中唯聖道思得業緣性餘之諸法不得焉本性親依止者唯為本性親依止而已前生緣仍不捨自之前生緣義依所緣所緣增上依止親依止根不相應有不去前生以外之八相而亦為多緣此為精細分解蓋此際若於所緣前生則不得依止根不相應緣性此外亦得亦不得應知後生緣仍不捨自之後生緣義依不相應有不去後生以外之三相而亦為多緣修習緣仍不捨修習緣義依無間等無間親依止無有去修習以外之五相而亦為多緣業緣仍不捨業緣之義先一剎那業依俱生相互依止異熟食相應不相應有不去業以外之九相而為多緣若異剎那業依親依止無間等無間無有不去業以外之五相而為多緣異熟緣仍不捨異緣義依因增上俱生相互依止業食根靜慮道相應不相應有不去異熟以外之十四相而為多緣食緣之中段食仍不捨食緣之義依有不去食以外之二相而為多緣餘三者仍不捨食緣之義如其所應而依增上俱生相互依止業異熟根相應不相應有不去食以外之十一相而為多緣根緣之中有色五根者仍不捨根緣之義依依止前生不相應有不去根以外之五相而為多緣色命根亦仍不捨根緣之義依有不去根以外之二相而為多緣無色之諸根亦如所應仍不捨根緣之義依因增上俱生相互依止異熟食靜慮道相應不相應有不去根以外之十三相而為多緣靜慮緣仍不捨靜慮緣義如其所應依俱生相互依止異熟根道相應不相應有不去靜慮以外之十相而為多緣道緣仍不捨道緣之義如其所應依於靜慮緣所說之十及因增上等道以外之十二相為多緣相應緣仍不捨相應緣義如其所應依因增上俱生相互依止業異熟食根靜慮道有不去相應以外之十三相為多緣不相應緣仍不捨不相應緣義去無間等無間修習相應無有去之六緣如其所應不相應以外之十七相而為多緣此中色與非色緣有別應知有緣仍不捨有緣之義去無間等無間修習無有去之五緣如其所應有以外之十八相為多緣無有緣去緣等於無間緣不去緣全等於有緣以上如是依一緣之多緣性判別應知四依緣同分者此等二十四緣中實以無間等無間無間親依止修習無有去為同分所緣所緣增上所緣親依止亦然以是方法此處依緣同分之判別應知五依緣非同分者於此中前生緣與後生緣為非同分相應緣與不相應緣亦然增上緣與無有緣去緣與不去緣以是方法此處之非同分應知六依雙者此等中又依義相似性聲相似性時相對性因果性相互相對性依此等相而依雙之判別應知如無間與等無間依義相似性而名為一雙依止與親依止依聲相似性前生與後生依時相對性業緣與異熟緣依因果性相應與不相應依相互相對性而名為一雙有與無有緣去與不去緣亦如之此為依雙判別應知七依能生非能生者又此等中無間等無間無間親依止本性親依止修習緣異剎那業緣無有去緣此等之緣但為能生而非非能生後生緣者但全為支持而非能生餘者為能生與非能生及支持之義如是依能生非能生判別應知八依一切處非一切處者又此等中俱生依止有不去緣名為一切處對於一切有為之諸色非色法為處為因之義謂無是等雖一法亦不生所緣所緣增上無間等無間無間親依止本性親依止前生修習相應無有去緣名為非一切處雖非一切諸色非色法之處但對於諸非色蘊有為處為因之義何以故唯諸非色法依是等生諸色法則不爾前生與後生亦為非一切處對於非色及色如其次第為緣故上所述也外餘亦為一分諸色非色法之生因故非為一切處如是依一切處非一切處判別應知九依色對於色等之分別者又於此等二十四緣之一緣雖無一向但名為色對於色為緣然有一向但名為色對於非色為緣然則俱是為前生緣也何以故前生緣者一向但為色對於非色為緣故也一向但名為色而對於色非色為緣者無之然一向名為非色而但對於非色為緣者有之然則俱是依無間等無間修習相應無有去之六種何以故此等任何一向但為非色而對於非色為緣故也一向但名為非色而一向但對於色為緣者有之然則俱是為後生緣也何以故此一向為非色而但對於色為緣故也一向但為非色而對於色非色為緣者亦有之然則俱是依因業異熟靜慮道之五緣何以故此等一向但為非色而對於諸色法對於諸非色法為緣故也一向名為色非色而但對於色為緣者無之然但對於非色為緣者有之然則俱是為所緣緣及親依止緣也何以故此二緣者一向為色及非色而但對於非色為緣故也若一向為色非色而同對於色及非色為緣者有之然則俱是依增上俱生相互依止食根不相應有不去之九緣何以故此等又皆一向為色非色而同對於色及非色為緣故也如是由對於色及非色等之分別應知一依有之別者先於五蘊有此等二十四緣中任何緣無不得名若於四蘊有去前生後生不相應之三緣但得餘之二十一緣於一蘊有依俱生相互依止業根有不去但得七緣若於外之不與根結合之色依俱生相互依止有不去但得五蘊以上依有之別判別應知善三法發趣釋第一施設分釋如是依順發趣等四中三法發趣等六二十四之全發趣合成發趣大論於此大論概依止一切三法等所有廣說故將三法發趣二法發趣乃至二法二法發趣次第言之於未言之前先就分別彼等之諸緣以論母設置及緣分別分之部分略說廣說今已說竟乃概依止一切三法等而廣說之即以三法發趣二法發趣乃至二法二法發趣之三法等依是等諸緣廣為開示依止一一三法各以七大分說明之即名為相緣分俱生分緣依分依止分相雜分相應分問分是也此中有云緣於善法而善法依斯緣於之語而說者名相緣分有云與善法俱生而善法依斯俱生之語而說者名俱生分此與前相緣分義雖無別然依緣於之語為依諸覺他者第一說而依俱生之語為依諸覺他者第二說又是二者不論何種其諸緣法及諸緣所生法通色非色應知又實彼等但為俱生不得前生後生有云以善法為緣而善法依斯為緣之語而說者又名為緣依分亦如前之二分通色非色應知然於此際亦得為前生緣此與前二分異者也其次有云依止於善法而善法依斯依止之語而所說者名為依止分此與前緣依分義雖無別然依諸覺他者以緣依之語為第一說以依止之語為第二說由此更有云雜於善法而善法依斯相雜之語而所說者名相雜分有云於善法相應而善法由斯相應之語而說者名相應分此與前相雜分義雖無別然以相雜之語諸覺他者第一說以相應之語為第二說又是等二者不論何種其諸緣及緣所生皆但為非色法應知更於第七分依善法對於善法由於因緣而為緣耶等之論法而起彼彼之間再由諸善因對於諸相應蘊等之論法解明一切彼等之間而有所分別故此分為諸問之善巧分別者故名問分更於此處諸緣及緣所生皆正為色而非色法應知此中最初名為相緣分者有依略說與依廣說之二種此中最初之畧說分亦名問分云施設分者亦同為其名也何以故蓋緣於善等而生善等由因緣等而畧說者故為畧說分緣於善等而善等生者由因緣等而有所問故為問分緣於善等而善等生者由因緣等而有所施設故亦謂之為施設分二六此中云若緣於善法而善法生為從因緣耶此為假定之問然此處之義即謂凡善法之為從因緣生者則彼為緣於善法耶或復謂緣於善法而某善法生則彼為從因緣耶是此處之義也此中云者用等義何以故等人者為匹敵之人等分者謂相對分故也云者是為努力欲行之語兩者合一而云者相對而行也換言之以名為俱生起之類似性質而到達之為與彼俱於一處生起狀態之意義而為言也善法之為物依如是俱生起之性質問言緣於善法而善法生為從因緣耶或復云者為緣也然此為緣雖前生緣及俱生緣皆得而在此處則為俱生義緣於善法而不善法等云者其理趣亦同此中以俱生故雖無有緣於善法而有不善法者於此問分所有諸答依義有得者亦有不得者一切皆由問所引出然後於答凡不得者捨之得者答之如是已知此處問之意義及問之方法今者應由於數而知問之分量此中緣於善法者以善之句始以善不善無記終三問復同以此善為始而以依善及無記等二種類為終者三復同以此善為始而以善不善無記三法為終者一如是緣於善法以善為始之問有七以不善為始者亦然以無記為始者亦然以善無記為始者以不善無記為始者以善不善為始者以善不善無記為始者皆同以上一一由於七各有七故依止善三法而於因緣有四十九問此中一法為根一法為結者有九一法為根二法為結者有九一法為根三法為結者三二法為根一法為結者九二法為根二法為結者九二法為根三法為結者三三法為根一法為結者三三法為根三法為結者一如是等問由根與結應知又如於因緣四十九問若於所緣緣等亦皆同之則於二十四緣全體當得如是復次更發一一問一千一百七十六而於一根論法式聚集得如是分量三六從此更將為從因緣及所緣緣耶之問為始作二根論法此中因及所緣二根乃至因及不去二根以上與因緣俱者有二十三個二根如於因緣於彼等中因及所緣之二根亦有四十九問本文所示唯彼等中之二而已又如因所緣二根之四十九於因增上二根亦爾此中於最初問之方法已示因增上因無間因等無間順次之三個二根眾示因不去餘即從畧此處問之分量如是應知若正發為一一問一千一百二十七即於二根之論法二十三之二根中三八從此更將為從因緣所緣緣及增上緣耶之問為始作三根論法此處增上緣等二十二根中一一與因所緣二根結合於是有二十二個三根彼等中由最初問示第一三根第二三根已示終之三根餘從略又如於二根如是於諸三根亦將一一三根作四十九則於二十二個三根全體當得如是三根論法中之數有一千七十八問三九更此將從為從因緣所緣緣增上緣無間緣耶之問為始作四根論法此處無間緣等二十一緣中一一與最初三根結合有二十一個四根彼等中示二個四根而畧其餘此處於一一四根作四十九於二十一之四根全體當得如是四根論法中之數有一千二十九問從此更以五根為始乃至說一切根略此一切而以前所述者與更應述者無異故於本文示以作一根二根三根四根五根一切根應廣說無混亂之論法此中於一根等所應述者已述訖於五根者正於等無間緣等二十緣中一一與最初之四根結合於是正有二十個五根彼等一一作四十九當得如是五根論法中之數則有九百八十問於六根者俱生緣等十九緣中一一與最初之五根結合於是有十九個六根彼等一一作四十九當得如是六根論法中之數有九百三十一問漢譯校者按日譯本作九百三十依下合計文及實數應作九百三十一於七根者相互緣等十八緣中一一與最初之六根結合於是有十八個七根彼等一一作四十九當得如是七根論法中之數有八百八十二問於八根者依止緣等十七緣中一一與最初之七根結合於是有十七個八根彼等一一作四十九問當得如是八根論法中之數有八百三十三問於九根者親依止緣等十六緣中一一與最初之八根結合於是有十六個九根彼等一一作四十九問當得如是九根論法中之數有七百八十四問於十根者前生緣等十五緣中一一與最初之九根結合於是有十五個十根彼等一一作四十九問當得如是十根論法中之數有七百三十五問十一根者以後生緣為始之十四緣中一一與最初之十根結合於是有十四個十一根一一作四十九當得如是十一根論法中數有六百八十六問十二根者以修習緣為始之十三緣中一一與最初之十一根結合於是有十三個十二根一一作四十九當得如是十二根論法中數有六百三十七問十三根者以業緣為始之十二緣中一一與最初之十二根結合於是有十二個十三根一一作四十九當得如是十三根論法中數有五百八十八問十四根者以異熟緣為始之十一緣中一一與最初之十三根結合於是有十一個十四根一一作四十九當得如是十四根論法中數有五百三十九問十五根者以食緣為始之十緣中一一與最初之十四根結合於是有十個十五根一一作四十九當得如是十五根論法中數則有四百九十問十六根者以根緣為始之九緣中一一與最初之十五根結合於是有九個十六根一一作四十九當得如是十六根論法中數有四百四十一問十七根者以靜慮為始之八緣中一一與最初之十六根結合於是有八個十七根一一作四十九當得如是十七根論法中數有三百九十二問十八根者以道緣為始之七緣中一一與最初之十七根結合於是有七個十八根一一作四十九當得如是十八根論法中數有三百四十三問十九根者以相應緣為始之六緣中一一與最初之十八根結合於是有六個十九根一一作四十九當得如是十九根論法中數有二百九十四問漢譯校者按日譯本作二百九十依下合計文及實數應作二百九十四二十根者以不相應緣為始之五緣中一一與最初之十九根結合於是有五個二十根一一作四十九當得如是二十根論法中數有二百四十五問二十一根者以有緣為始之四緣中一一與最初之二十根結合於是有四個二十一根一一作四十九當得如是二十一根論法數有一百九十六問二十二根者以無有緣為始之三緣中一一與最初之二十一根結合於是有三個二十二根一一作四十九當得如是二十二根論法數有一百四十七問二十三根者以去緣為始之二緣中一一與最初之二十二根結合於是有二個二十三根一一作四十九當得如是二十三根論法數是則有九十八問更於二十四根者為一切緣之總合應知以此故稱為一切根此處唯四十九問是等完全但取因緣之句以一根為始一切根為終自昔大師為諸天眾廣為分別此處雖略示問句更於彼等全體有此合計何以故於一根論法所傳說者為一千一百七十六問故也於彼等中之因緣論法但以因緣為根成四十九應取此因緣根餘者應入於餘緣根中於二根為一千百二十七三根為千七十八四根為千二十九五根為九百八十六根為九百三十一七根為八百八十二八根為八百三十三九根為七百八十四十根為七百三十五十一根為六百八十六十二根為六百三十七十三根為五百八十八十四根為五百三十九十五根為四百九十十六根為四百四十一十七根為三百九十二十八根為三百四十三十九根為二百九十四二十根為二百四十五二十一根為百九十六二十二根為百四十七二十三根為九十八一切根者四十九如是以因緣為始而於所分別之一根等當得如是復唯一因句一根等分別正得有一萬四千七百問四一如是以因緣為始從一根乃至一切根示問之分別今為欲示以所緣緣為始故言若緣於善法而善法生為從所緣緣耶為從因緣耶此中云為從所緣緣耶乃至為從因緣耶者即示以此所緣緣為始以因緣為終之一根論法也於此更云為從所緣緣及增上緣耶為以二根為始也此中示此最初之二根並所緣不去之二根餘者從略亦未示為從所緣緣及因緣耶為終之二根若更於何處誦道者亦同此誦道所應理解於此更不全示由所緣緣之三根等為示以增上緣為始之一根等故但言為從增上緣從無間緣從等無間緣從俱生緣從相互緣耶此為一根或為多根應知於此更為示但以不去緣為始之二根故始云為從不去緣及因緣耶此中言不去因二根不去所緣二根不去增上二根順次三個二根正所以終示不去去之一個二根也四二於此但由不去緣應示三根而言為從不去緣因緣及所緣緣耶又云為從不去緣因緣及增上緣耶為從不去緣因緣及無間緣耶如是順次言三根已而言為從不去緣因緣及去緣耶為最後之三根四三於此但由不去緣應示四根而以為從不去緣因緣所緣緣及增上緣耶為從不去緣因緣所緣緣及無間緣耶說二個四根已出所謂為從乃至去緣耶之句而記之其餘一切概從略云四四為示此所略一切故云一一句之一根二根三根四根五根一切根應廣說無混亂是故如以因緣為始由因等句於一根之一千一百七十六問乃至於一切根之四十九如是於所緣緣等亦一一為始由所緣等句之一一句於一根一千一百七十六問乃至於一切根之四十九此一一句於一根等分別時有一萬四千七百問於一切二十四緣問之分量當得如是斯順中善三法問善為一一分別者是當得三十五萬二千八百之數量又如善三法受三法等之問亦如是此亦於諸一切二十二之三法當得如是復次如是善分別而於三法之種類有七百七十六萬一千六百之數量又於二法發趣云緣於因法而因法生為從因緣耶如是云緣於因而因緣於因而非因緣於因而因及非因緣於非因而非因緣於非因而因緣於非因而因及非因緣於因及非因而因緣於因及非因而非因緣於因及非因而因及非因於一一二法就因緣等中一一之緣而有九問是等中以因緣為始於一根有二百十六問是等中不涉及他但就因緣應得九問於是等之二根等二十三分各各九問一一除去乃至盡一切根有次之分量先於二根者於一根所示二百十六問中除去九則有二百七問於此去九則於三根為一百九十八如是從前前遞除去九則於四根為一百八十九於五根為一百八十於六根為一百七十一於七根為一百六十二於八根為一百五十三於九根為一百四十四於十根為一百三十五於十一根為一百二十六於十二根為一百十七於十三根為一百八於十四根為九十九於十五根為九十於十六根為八十一於十七根為七十二於十八根為六十三於十九根為五十四於二十根為四十五於二十一根為三十六於二十二根為二十七於二十三根為十八於一切根為九更如由是等因緣於一根之二百十六問乃至於一切根之九問如是亦於所緣緣等以一一為始由所緣等句於一一句之一根為二百十六問乃至一切根為九問如此一一句於一根等分別時有二千七百問更於是等一切二十四緣其分量如次復次如是善分別因二法順論法中是等當得問數量有六萬四千八百又如因二法之問有因二法等問亦如之因此於全部一百之二法中當得如是復次知百二法中六百四十八萬問是為先於單純之三法發趣及二法發趣問之分量也且更取二十二之三法令入於百之二法中而說所謂二法三法發趣者此中如云緣於因善法而因善法生為從因緣耶此二十二之三法中一一三法與百之二法結合應說問之分量由前所述方法就一根等全體可以算知復次更取百之二法令入於二十二之三法中而說所謂三法二法發趣者此處如云緣於善因法而善因法生為從因緣耶此百之二法中一一二法與二十二之三法結合應說問之分量由前所述方法就一根等全體可以算知復次更取諸三法令入於相同諸三法中而說所謂三法三法發趣者此處如云緣於與樂受相應之善法而與樂受相應之善法生為從因緣耶此二十二之三法中一一三法與餘之二十一之三法結合應說問之分量由前所述方法就一根等全體可以算知復次更取諸二法令入於相同之諸二法中而說所謂二法二法發趣者此中如云緣於因有因法而因有因法生為從因緣耶是百之二法中一一二法與餘九十九之二法結合應說問之分量由前所述方法就一根等全體可以算知所以者何由如來全示此分別對於天眾曾為說法故然如來對於法將舍利弗略謂今日所說如是如是但以論法說示而略述之長老舍利弗亦以相同之略說而轉誦出以此長老所轉者於結集時依同論法而為編輯為示此略論法故置此三法妙發趣云云之偈也此云三法妙發趣者殊謂為妙為最妙之三法發趣也及最上二法者謂殊最上殊勝之二法發趣也並二法三法者謂二法三法發趣三法二法者謂三法二法發趣與三法三法者謂三法三法發趣二法二法俱者謂二法二法發趣順中之六論其法為甚深者謂是等三法發趣甚深之六個論法於順中應知也此有二順謂法順緣順此中緣於善法而善法者為於阿毘曇論母句所攝依諸法順說而轉故名為法順從因緣從所緣緣者依二十四緣順說而轉故名為緣順此中註云三法妙發趣乃至順中之六論其法為甚深之偈指法順言然於此處此偈指此法順中之緣順言是故順中之六論其法為甚深之註偈謂法順中之三法發趣等之六論法為甚深如是之義應知然於此處以從因緣從所緣緣如是轉者正謂於緣順中之法順是等三法發趣等之六論其法為甚深如是之義應知是等中於順三法發趣但由善三法於相緣分此施設分略說問分別於餘之三法二法及餘發趣且不說一問再於由後之俱生分等善三法亦不引問唯就可能僅作答說然而由順中之六論其法為甚深之語則於此緣順更應示此等六發趣論法以問引出者是為釋發趣之阿闍棃輩之責務也四五今論於逆為說彼故以緣於善法而善法生為從非因緣耶為始其處有與順問相同問之分量正以此故此處則言如於順而廣說因緣者如是於逆之非因緣亦應廣說於四七終復言如於順說一一句之一根二根三根四根乃至二十三根如是於逆亦應廣說也又二十三根云者此處僅指二根而言終則有一切根之二十四根雖亦如之然一切但從略三法妙發趣乃至逆中之六論其法為甚深者此處所云亦有二逆為法逆與緣逆此中云諸善法者即為阿毘曇論母句所攝諸法云緣於非善法而非善法由逆說轉故名為法逆云從非因緣從非所緣緣如是由二十四緣逆說而轉故名為緣逆此中註云三法妙發趣乃至逆中之六論其法為甚深偈指法逆言然於此處此偈正指法順中緣逆而言故逆中之六論其法為甚深云者於註偈為法逆中之三法發趣等之六論其法為甚深是義應知然於此際之從非因緣從非所緣緣於如是轉之緣逆中順三法發趣等之六論其法為甚深之如是之義應知是等中但由順三法發趣中唯善三法於相緣分之施設分略說此問分別於餘之三法二法及餘之發趣且不說一問更於後之俱生分等之善三法亦不引問唯就可能作答說然而由逆中之六論其法為甚深之語則於此逆緣應說此等六發趣論法由問所引出者實釋發趣論阿闍棃輩之責務也四八今論順逆為說彼故以緣於善法而善法生為從因緣及非所緣緣耶等為始此中為從因緣及非所緣緣耶乃至為從因緣及非不去緣耶之因句與餘之二十三緣中一一結合以之為緣於以因為始之一根而有二十三之順逆於彼等之一一而作四十九則有一千一百二十七問復於二根因所緣句與餘之二十二緣中一一結合由此而有二十二之順逆如是於順說者全於一根等而逐一句減由其殘餘而問數可知又此處一根等之問全於本文傳說亦有亦無且置然彼等一切正順於前所述之理趣應知五一復於此處云三法妙發趣乃至於順逆六論其法為甚深者與前所述相同理趣而有二種順逆法者即為法順逆及緣順逆此中善法者為由阿毘曇論母句所攝諸法緣於善法而非善者為由順逆說而轉者名法順逆為從因緣及非所緣緣耶者於斯二十四緣中所得諸句由順逆說而轉者名緣順逆此中於前註所云三法妙發趣乃至於順逆六論其法為甚深之偈雖指法順逆而言然此處之偈正指法順中之緣順而言故於順逆六論其法為甚深云者於註偈則為法順逆中之三法發趣等之六論其法為甚深是義應知然於此際云為從因緣及非所緣緣耶謂如是所轉之緣順逆中於法順之三法發趣等之六論其法為甚深如是之義應知是等中但由順三法發趣中唯善三法於相緣分中之施設分略說此問分別然於餘之三法二法及於餘之發趣且不說一分更於後之俱生分等由善三法而不引問但於可能僅作答說然而由於順逆六論其法為甚深之語則於此緣順逆中應說是等六發趣論法由於問而引出者實亦為釋發趣論阿闍棃輩之責務也五二今論逆順為說彼故以緣於善法而善法生為從非因緣及所緣緣耶等為始此處與順逆之問同問量又於此處一根等之問凡於本文傳說亦有亦無且置然彼等一切正順於前所述之理趣應知復於此處所云三法妙發趣乃至逆順中六論其法為甚深由於同前所述之理趣而有二種逆順即法逆順及緣逆順此中善法為阿毘曇論母句所攝諸法云緣於非善法而善法由逆順說而轉者名法逆順云為從非因緣及所緣緣耶是二十四緣中所得句由緣逆順而轉者名緣逆順此中於前註云三法妙發趣乃至逆順中六論其法為甚深此偈指法逆順而言然於此處之偈正指法順中之緣逆順而言故於註偈云逆順中六論其法為甚深者謂法逆順中之三法發趣等之六論其法為甚深如是之義應知然於此際云為從非因緣及所緣緣耶者謂緣逆順中之法順是等三法發趣等之六論其法為甚深如是之義應知彼等中但由順三法發趣中善三法於相緣分中之施設分略示此問分別然於餘三法二法及於餘之發趣且不說一分更於後之俱生分等由善三法而不引問但於可能僅作答說然由逆順中六論其法為甚深之語則於此緣逆順中應說是等六發趣論法由於問而引出實亦釋發趣論阿闍棃輩之責務也相緣分義釋緣順五六今於施設分依止於善三法由因緣等四十九為始但示論法而說是等無量之問此中無善不善等之俱生故凡云緣於善法而不善法從因緣生如是之問不可答者捨之而但答凡可答者職是之故對於相緣分之廣說分亦始於此緣於善法而善法從因緣生等之論法此中從因緣等之是等四十九問若悉不可答者則何為而說耶非應但說可答之問耶誠然亦將應如爾所說若如爾所說時一切三法二法發趣中之一一三法二法二法三法三法三法二法二法於此無略必須說所應說何以故於善三法可答者於受三法非必可答又於法順逆之三法發趣中對於尋三法及喜三法之答是等一切之問任何可答是故精為分解於一一三法有盡可答之問全於善三法說之所以者何在如是說時此中凡不可答者捨之雖唯說其可答亦顧及使得容易了別為欲容易了別故一切俱於善三法說之是故此處不可答者捨之但答所可答者應知此中緣於善法者緣於四地諸善法中之受蘊等類之一法換言之則為相對而進或以等於名為俱生起之性質而到達或於與彼俱至轉之狀態之義也云善法者同四地諸善法中之想蘊等類之一法也云生者為從生至滅而生起或出生之義也有謂之得自我亦得生住滅之三剎那云從因緣者從於由善因而成因緣性也如是對於生從因緣耶之問而作生之答今以緣於某法而某法生時此法就蘊可示故言於善之一蘊等也此中於善之一蘊者為受等四蘊中之任何一蘊也云三蘊者取隨一蘊為緣則捨隨一蘊外之餘三蘊也云於三蘊者取受等中之某一蘊生則捨此外之餘三也云於二蘊者為受想之二蘊等六聚之二蘊中緣於任何二蘊也云二蘊者取隨二蘊為緣則捨隨二蘊外之餘二蘊從於由善因之成因緣性者而生之義也然一蘊唯對一蘊或唯對二蘊或二蘊唯對一蘊而為緣者決無故不言緣於一蘊而一蘊緣於一蘊而二蘊緣於二蘊而一蘊緣於善法而無記法從因緣生等由與前述者同理趣意義可知云心等起色者其緣義為俱生義故此言為示凡與善俱生者同時亦得因緣後遇如是處理趣亦同云異熟無記唯作無記者此處無因為無有因緣故不應取又無色界繫異熟無與色俱生故不應取云於結生剎那者謂為示名業為果色之無記緣於無記蘊而生起者云異熟無記者謂由於存在於此剎那之無記蘊云緣於四蘊而所依者謂以業果色之意義而取所依時亦為緣於四蘊而所依生云緣於所依而四蘊者為欲說示緣於所依而四蘊生起故云於一大種等者為欲說示緣於色無記而色無記生故更因與於一蘊等所言同其理趣而此處意義之關係可知如是已述色無記之緣四大種而四大種生今為欲說緣四大種而諸所造色生故言緣四大種而心等起等設如是則但言所造色已足何故言其他二者耶緣於四大種亦生故為說之也何以故於後所示心等起色及業果色非全然但緣四蘊而生者亦緣於四大種而生為欲說此故為此言應知此中心等起色唯於轉時業果色亦於結生時所造色云者正為彼二者之別緣於四善蘊及四大種云者於此處唯取諸心等起之四大種又云心等起色此中亦取大種色及所造色何以故由緣一大種而三大種等之理趣而大種色亦緣於四蘊及諸大種而生由所言緣於四大種而所造色之理趣所造色亦生故也對於不善及無記之問其答亦與是同其理趣如是於因緣但九問為所答也實唯是等於此處得餘之四十為空問而無有答由此方法亦於所緣緣等對問之答其義應知然於處處但有應伺察之價值者我應伺察之五七於所緣緣先以色由所緣緣不生故是等九問中捨其雜於色者唯答三問再以與之同理趣而言緣於所依而四蘊而不言緣於四蘊而所依何以故是為由所緣緣不生故也五八於增上緣云異熟無記者但指出世間異熟而言故於此處不說於結生剎那餘全等於因緣五九於無間等無間亦不得色故如於所緣緣唯三問耳六於俱生緣云於結生剎那者為就於五蘊有之結生而言然前於緣分別分有云於入胎剎那彼此是一但語之異耳又依三事和合故有入胎之語則入胎云者是五蘊有之名結生也結生云者雖通於一切有此處依業果色等之語則但為五蘊有之結生義所以者何彼攝色之能緣性及緣所生性亦攝非色故也是故以全答說之於外之一大種云者指不與根結合之地石等大種所以者何於緣分別云四大種者雖兼內外而言然彼為略說此乃廣說故分別一切逐一說之而言於外之一大種等也緣於諸無想有情之一大種者就二相續等起大種而言云緣於四大種而業果色者則但就業等起而言云所造色者此但就時節等起而言六一於相互緣云緣於四蘊而所依緣於所依而四蘊者為欲說四蘊俱與所依為相互緣言六二於依止緣其緣義即俱生義故前於緣分別分所說眼處等之依止緣性此處不說何以故眼處等雖為前生而為緣然此處但取其俱生者故唯言依止緣等於俱生緣六三於親依止緣無色之親依止故但得三答是故言等於所緣緣於此處雖或一切善不善無記不得所緣親依止然依凡可得者故作斯言應知六四於前生緣云以所依為前生緣者為從緣所依由所依而完成前生緣性而生之義也云於異熟無記之一蘊者此處言入胎剎那對於異熟無記不應取與俱生緣之所依應分別前生緣故也再凡於無色界之善等不得前生緣彼等亦應分別同前生緣故於此處不應取又所緣亦必不得前生緣性何以故色處等但對於眼識等成前生緣性對於意識界亦有過去未來之緣故也是故此處不取色處等所以然者此說由於蘊而不由於識界故再於所說於異熟無記之一蘊云者雖取一切識界但非眼識界等於後生者對於諸善不善不為緣對於無記亦為支持者而非能生者是故從後生緣生如是之言應無一法故由於後生緣者不作答六五於修習緣者一切唯作非必得為修習緣然容許有故說唯作無記是故此處但謂證用唯作應知六六於業緣者在諸善不善之位為一剎那之業緣應知在唯作無記之位亦爾然於異熟無記之位亦為異剎那之業對於結生剎那之四大種亦爾然對於諸心等起色者但一剎那之業對於諸業果色者但為異剎那之業對於諸無想有情之色亦爾然此處云業果色者為命根其餘一向非業等起者故言所造色雖然如是此處正以業等起色為義六七於異熟緣者不得善不善及唯作此但就無記作答耳云心等起者但異熟心等起云業果色者隨應而為根色及所依色云所造色者為其餘之存在於其時之所造色六八於食緣者一切善等蘊及心等起色由非色食而生應知於結生剎那之四大種亦爾云心等起者從有分等心之等起云食等起者為段食等起云心等起者實唯善不善心等起於緣分別分者依食之順序最初說段食然此處對於善法云云之問於最初說非色食應知六九於根緣者於前緣分別依根之順序雖最初說眼根此處依善等之問最初說非色根之緣性也此中於善等如其所應取諸非色根於諸無想有情之大種色亦應取命根七於靜慮道緣者全等於因緣之答故此處言等於因緣云七一關於相應緣之答次於所緣緣故此處言等於所緣緣云七二於不相應緣云是以所依為不相應緣者為緣於所依而從不相應緣換言之由於以所依而成不相應緣性而生之義也云是以四蘊為不相應緣者為緣於四蘊而從不相應緣換言之由於以四蘊而成不相應緣性而生之義也云四蘊是以所依為不相應緣者為四蘊緣於所依而從不相應緣換言之由於以所依而成不相應緣性而四蘊生之義也云心等起色是以四蘊為不相應緣者為緣於四蘊而從不相應緣換言之心等起色由於以四蘊而成不相應緣性而生之義也其餘諸答云是以所依為不相應等亦與前述同其理趣其義應知又於異熟無記由此取所依故應攝眼等於一大種等者為示色無記之緣性而言云心等起者為無記心等起及善惡心等起也七三有緣於俱生緣故此處言等於俱生緣云七四無有去次於所緣緣七五不去次於俱生故於此言等於俱生緣云是等二十三緣者總略上說而言云應廣說者就凡可回答之問應為廣說是為於善三法答中相緣分緣順中以因緣為初一根之義釋也七六今於此處就因緣等中一一緣可得答分計其數而說示之以於因九等為始也此中於因九云者關於因者問答分有九如下由於善而善由於善而無記由於善而善及無記由不善而不善由不善而無記由不善而不善及無記由無記而無記由善及無記而無記由不善及無記而無記云於所緣三者由於善而善由於不善而不善由於無記而無記也云於增上緣九者全於因所述者等所以然者於十二個緣各各言九任何問答皆全等於因緣故然於分別則有不同於十緣各各言三任何問答全等於所緣然於分別則有不同於相互緣對於無記句之答以色亦可得於前生緣亦然於修習緣為諸異熟又經路心者不可得云於異熟一者唯由於無記而無記也要約言之以九三一為答分之分量者正有三種若廣說者九答十二三答十一答一此於二十三緣全部有一百三十九一百三十九問與一百三十九答皆同此稱七七以因緣為始之一根已如是示數此後就二根等略其廣說而於示一根所說中但取所得之數而示答分之分量關於二根先言於從因緣與所緣三等云此處之說相如是多數分之緣與少數分之緣結合則正與此少數為同數故言於從因緣與所緣三云於因所緣二根之際為與於所緣所說同得三答之義也然同數分之緣與同數分之緣結合則全數無減故言於從因緣與增上九云於因增上之二根為同得九答之義也云於異熟一者為因異熟二根於異熟所說同得一答也如是於二根答分之分量應知七八於三根等亦與是同說相故言於從因緣及所緣緣與增上三云此為於因所緣增上三根與於所緣所言同得三答之義也如是於一切之論法應如是推理七九然於十二根不得異熟緣故言於從修習緣與業緣三已不接異熟而言於食三等云於十三根等理趣亦與是同八然省略彼等但將二十三根於此處說示之彼有二種謂具修習或具異熟此中最初說具修習彼正得三答故言於從修習緣乃至與不去三云八一至八二然具異熟者不得修習故捨彼而從異熟以示數逕云於從因緣乃至異熟緣與食一說一論法已而後說二十三根然於此等二個之二十三根一則無異熟緣一則無修習緣雖於二處皆無後生緣然由慣用語故稱是等為二十三根應知是等之中於具修習者隨修習而同三答於具異熟者隨異熟緣而唯一以上為以因緣為始而一根等之數也然此因緣之次所言置所緣時不論於何處但有三問者若以此所緣緣為始則於一根於二根等徧於所緣句並所緣與餘緣配列否則於應有九問但說三問故作此言耳然於異熟句及異熟句與餘緣之配列則為一問以上先於多數分之緣與少數分者配列則但以此少數與等數言已全說之八三至八四今由所緣等可說之一根等中以一根與前因一根全等之意故關於一緣都不說然應示由所緣緣關於二根之數而言於從所緣與因三與增上三乃至與不去三云然於此處雖可言於從所緣緣與增上三乃至與不去三凡與因緣等多數分之諸緣配列時可示所得之數置於所緣緣前之因緣亦置於後而言於從所緣緣與因三由此而明次事即所緣緣隨一一多數分或與等數分緣之為二根三根等類不拘何時亦唯有三問答然與異熟緣配列時唯得一此於以異熟緣為始之答數意可明了故此處不說又凡於二根所示是等之數於三根等亦有與是同數之意故於由所緣緣而三根等不廣說之今應示由增上緣等而於二根等之數為言於從增上緣與因九是與前所述者同其理趣緣廣說可應知又如於從增上緣與因九如是於餘與因等數分之緣者亦同為九若某緣為始與彼等數分之諸緣配列時順於為始之緣而有答數反之與彼少數分之緣配列時正順於少數而有答數應知又如由於所緣緣於增上緣亦然於其他無間等亦然三根等不為廣說故但於二根示其數而一切處皆可成立由是故言以一一之緣為根由於諷誦而計算之云緣逆八七然逆緣中不得善句以善法無因緣不生故是故以緣於不善法等始也此中云從非因緣者否定因緣即無因緣而由他緣以生之義也所以者何若此疑俱行掉舉俱行之癡者對於諸相應法並心等起色雖以自為因緣然對於自無他之相應因故云從非因緣生除因緣外亦從於適當餘自之緣而生故也由此理趣凡否定之義如是應知此無因異熟無記者就使色等起者言應知其他如是處亦同此理趣八九非增上緣者實即無增上亦無與自俱之第二增上故不得增上緣然如疑俱行掉舉俱行之癡為無因諸增上為非無增上又欲等中之隨一不為增上善等生時一切善等亦無增上是故如癡唯不別別舉增上而攝一切故作此緣於善之一蘊而三蘊等說應知九非無間非等無間者亦如非所緣唯色為緣所生以是故言等於非所緣緣俱生緣缺又如是依止有不去緣亦爾何以故無是等者俱不生故若除俱生依止有不去緣者實無有一色非色法得生故缺是等九一於非相互緣分別云於結生剎那緣於異熟無記之四蘊而業果色者為除心所依應知九二於非親依止分別唯色為緣所生所以者何彼不得親依止緣故也若非色者設不得所緣親依止本性親依止亦脫無間親依止故也以是故言等於非所緣緣九三至九四於非前生云心等起色者就五蘊有言云從非後生緣者此處攝俱生前生緣故此處之本文等於俱生緣然於非增上緣已廣說故從略九五非修習緣者由善不善最初之證用應知唯作無記亦爾然此處本文亦通於非增上緣廣說應知故言非後生緣及非修習緣皆等於非增上緣云九六非業緣者非謂異熟思得異剎那業緣之意九八非食緣者但一分之色為緣所生非根緣亦爾一非靜慮緣者五識法及一分之色為緣所生所以者何五識以受與心一境性弱故以審慮相不全彼等不取靜慮緣一一非道緣者無因異熟唯作無記及一分之色為緣所生一二至一三非相應非無有非去者唯色為緣所生故云等於非所緣緣一五至一六云於非因二一根之答數者如本文所出於二根云於從非因緣與所緣一者此處設多數分緣與少數分緣配列時從少數分緣雖可如非因緣二然由非所緣無諸非色法故指緣於無記而色無記生而言一也凡一答處悉與是同理趣然言二之處於非因所得通為二分應知復於三根等之一切者缺非所緣緣時故唯一答以上為以逆說因緣為始一根等之數一九又非所緣緣等者先說一根與前等故此處亦同不示於非所緣緣二根云於從非所緣與非因一者與同於非因二根言之云於非增上五者以通於非所緣緣所得者應知如是於一切配列準於少數答之緣為答數應知然不論何處非所緣緣加入之處唯色為緣所生也非無間非等無間非相互非親依止非食非根非相應非無有非去緣加入之處亦與之同理趣非食非根非靜慮非道緣不論何處其答相等非俱生等之四此處亦同缺以上為此處之說相然由是說相於一切之二根等以此緣為根又是為此處之二根為三根為一切根考察是等而依於少數答之緣以為答數應知緣順逆一三三今當於順逆緣示其答數以於從因緣與非所緣五等為始此中因增上道緣之順置時俱生依止有不去等四一切處緣與食根靜慮道緣之四是等八者若是逆緣則不可得所以者何由因緣等而生之法言不得是等八緣決無有故復次所緣無間等無間親依止相應無有去緣之順置時則非色處緣逆則不得所以者何由所緣緣等而生者無不得無間等無間緣等故復次俱生相互依止業食根有不去緣之順置時唯四一切處不得逆所以者何以此等緣力而生時不得一切處緣者決無有故後生緣若是順則不存在如是其餘亦於順而存在者中考察其所不得者就一切二根等之論法於一一緣之配列依少數答當知其答數緣逆順一九二今當於逆順緣示其數以於從非因緣與所緣二等為始此中因之逆置時除增上餘皆得為順然後生為順者於一切處不得所言九緣唯對於非色中除前生與修習外餘七逆置時餘非色處則不得為順何以故由所緣等而不生者不得無間等故然結生異熟從前生又一切異熟與唯作意界俱雖由修習不生亦得無間等以是故言除前生與修習前生後生修習異熟不相應之逆置時除不去餘順得業緣之逆置時除異熟緣餘順得為順食根之逆置時除一切處緣與相互業食根緣餘得為順其他者依結合之緣而得靜慮緣之逆置時因增上修習道緣不得順道緣逆置時因增上緣不得為順不相應緣逆置時除前生緣餘皆得為順如是彼等諸緣逆置時知凡得為順者與一一諸緣之配列依於少數分之諸緣當知其答數又就二根等之論法凡以某緣為始而說某等之二根等則一一由可得不可得緣如於所說應善考察一九五此中當說由於非因二根等之論法而言從非因緣非所緣緣修習緣到修習止完全相等云者此與於從非相互緣與俱生一等相等應知又非業算入時則有五問以錫蘭語所書義非因緣為始謂從非業緣如是與非業配列云於俱生一如是所說之五緣依順可得其他則不可得也然於其他如是之處雖不引文所謂之義亦可理解何以故為如是之文縈於己懷托古人等而以自語書之故也更就此逆順說之緣所生法中有得業緣而不得根緣法此為屬於無想及五蘊有轉時之色命根應知有法得道緣不得因緣此為疑掉舉俱行之癡應知有法得靜慮緣不得道緣此為意界及無因意識界應知此中業果色唯由異剎那業而得業緣此中諸色法不得因增上異熟根靜慮道緣一切處緣之逆無於非因者無增上由是等複雜情形而此處之數分循序應知此中此之論式於從非因緣與所緣二之在此處者是以無因癡與無因異熟唯作為緣所生故指由不善而不善由無記而無記而言二也其餘亦與之同理趣然於修習者不得異熟唯作之意界亦爾是故此處由無記而無記云者為唯作無因意識界應知云於異熟一者由無記而無記也云於道一者由不善而不善也一九八於非所緣根而云於因五者唯色言何以故此為緣於善不善無記善無記不善無記之五類而生於一切之五亦與是同理趣云於相互一者指大種色與所依言何以故是等從非所緣與相互緣生故三根亦與是同理趣二於非增上根而云於因九者與順因所言者同云三等者亦與前順所言者全等於三根而云二者與前言從非因緣與所緣者全等二五於非前生根而云於因七者由前無色者緣善之一蘊等之論法通於非前生而說者也於一切之七與同理趣二一四於非業根之於因三等者唯思為緣所生是指緣於善不善及無記而生者故言三由是理趣於所傳說一二三五七九之答處其答數可知然云四六八等之三答數全無俱生分釋於俱生分云與善法俱生者謂緣於善法而與彼俱生者之義也其餘與相緣分所言者同其理趣應知復次於此終末云相緣義即俱生義俱生義即相緣義者為欲說是等兩分於義非異蓋是等二於義非異種雖然為欲決定相互之義而說之也何以故於緣於眼及諸色等者言非俱生亦緣而生又所造色對於大種色雖為俱生而無緣義故如是由相緣分者為欲決定俱生緣性以俱生緣性由俱生分者則言緣故是等兩者俱說又隨諸覺他者之意樂為修飾言說故為詞無礙解分別了知故說是等兩者也緣依分釋二四六於緣分而云以善法為緣者謂於善法而安住者或由依止善法作為緣義云以善之一蘊為緣者謂以善之一蘊作依止而三蘊從因緣生者以此方法於一切句意義可知云以所依為緣而異熟無記唯作無記之四蘊者是就於五蘊有轉而言何以故於五蘊有轉者前生之所依對於四蘊而為依止緣故然於相緣分相緣之義為俱生義故則不得此理趣但指結生之俱生所依而言緣於所依而四蘊也於以善之一蘊及所依為緣而三蘊等亦與此同理趣意義可知云以無記法為緣而善及無記者指善及無記俱由因緣生而言何以故善之生起剎那依止於所依而四善蘊與依止於諸心等起之四大種而心等起之所造色由於因緣而俱生然於異時無記為緣亦指諸緣所生由於因緣而俱生者而作斯言應知其他此種地位亦與是同理趣如是於此因緣者俱生與前生由依止義而為緣答十七問此中謂四蘊及四大種由於俱生所依由於俱生前生也然於相緣分由於俱生而為緣以此故於彼處但答九問更於此處所答是等十七問中於始一終一之答者善等中之有從一緣一緣所生於始一終二之答者有從一緣多緣所生於始二終一之答者有從多緣一緣所生於始二終二之答者有從多緣而多緣所生也二五一於所緣緣等亦以同法而問答之種類可知然於此所言以所依為緣而四蘊者但指於結生剎那之異熟四蘊而言為示眼識等依止於無記由於所緣緣而生者之類也再云以所依為緣者為示轉時之諸異熟唯作無記之生而言餘於前理趣通應知如是於此所緣緣以俱生與前生為緣答七問此中謂四蘊由俱生所依由俱生及前生眼處等由前生而為緣也然於相緣分但由俱生而為緣故彼處但答三問二五六於增上緣之異熟無記但出世間應知無間等無間因非色之緣所生等於所緣又於修習無有去亦同此理趣二五八於俱生緣云所造色之業果色者稱所造色之業果色但指諸無想有情之色而言眼處等依五蘊有而言也二五九又於相互緣云如所緣緣者指答之相等而言然於緣所生則有異二六一於親依止緣云等於所緣緣者非色之緣所生故亦指答之相等而言二六二以所依為前生緣等義者應知與在相緣分所述者同其理趣二六四於業緣云三者應知為以善為緣而善以善為緣而無記以善為緣而善及無記之三也於不善亦與是同二七於不相應緣云以四蘊為不相應緣者謂依止於四蘊以之為不相應緣而生之義云四蘊以所依為不相應緣者謂諸蘊依止於所依以之為不相應緣而生之義餘與前所述同應知二七二今準所得答數以數字示之言於因十七等也此中云於因十七者如由於善而善由於善而無記由於善而善及無記之由於善者始於一終於一者二終於二者一以上有三由不善者亦然由無記而無記同而由之而善不善善及無記不善及無記由於善及無記而善無記善及無記由於不善及無記而不善無記不善及無記以上如是有十七應知云於所緣七者即由於善而善由於不善而不善由於無記而無記由於無記而善由於無記而不善由於善無記而善由於不善無記而不善以上為七云於異熟一者但由於無記而無記也如是此處之答分分量為十七答七答一答之三其中十七答者十二七答者十一一答者一以上是等一切善為考察而後之由於二緣三緣等緣之配列其答數順於少數可知何以故以其數於二根等之答分分量可得而知故二七三復次不接以善法為緣而善法但應依數而示答分之分量以於從因緣與所緣七等為始也於其處云以善法為緣而善法從因緣及所緣緣生曰以善之一蘊為緣而三蘊由此論法於所緣所得之答應廣說之以上先說順之理趣二八三然於逆不得善故云以不善法為緣此以不善為初而開始答句此全仍本文之原文為限何以故凡此處所應言者同於相緣分之逆說故更於此逆所得答之分量為欲就數以示而以於非因四等為始此中有四十七七五三一之六分量由是而於二根三根等之緣配列其答數可知何以故得十七答之緣與彼得等數答之緣配列為十七少數答之緣配列亦得餘之分量如是於餘除增加分量亦得正等及減少又於此處不得有增加是此處之定則也又正等與減少若意義相違時則不得是故此處言於從非因緣與非所緣一等何以故此處傳說有於非因四非所緣五故雖順於非因而得言四然與非所緣配列之結果有所緣法相違故捨此以不善法為緣而不善法以無記法為緣而不善以不善及無記之法為緣而不善法之三答但舉以無記法為緣而無記之色之一句如是於一切處知相違不相違而其所得答之分量應知二九二更於此處說此唯論法云於非增上四者與於非因所得者同其餘之四亦與是同云於非無間一者為無因心等起色並餘色之由於無記而無記也如是凡一答者謂所應之色應知云於非前生二亦於此處雖順於非因可得言四然與非前生配列故由所依為前生而捨以無記法為緣而不善以不善及無記之法為緣而不善之二答但就無色之無因癡及無因唯作而言二答也云於非不相應二者就無色之無因不善無因唯作而為二也云於非無有非去一者就一切色而得視為由於無記而無記於三根等無新者二九四又於非所緣之二根云於非增上五者與於非所緣所得者同云於非業一者此處不取心等起色及業果色就餘之色而可知為由於無記而無記也於非增上根云於非前生七者與於非前生所得者同云於非後生十七者亦與彼處所得之十七同非無間非等無間非相互非親依止非相應非無有非去根全等於非所緣緣根由以上唯論法之說明而於一切處有所傳說者無所傳說者所得者非所得者應知依止分釋三八於依止分云依止於善法者謂由於安住義而以善法作依止也其餘與緣依分所言者同此理趣應知又於其終云緣依義即依止義依止義即緣依義者為示是等兩分若從義言則非有別何以故若從義言是亦如相緣與俱生之義無別種雖然如是為欲決定相互之義而說何以故於以無明為緣而行等者非依止而轉之異剎那者亦得言為緣而生也於相互依附而立之棒等者非一對於一而為依止緣如爾所造之色對於大種決非依止緣為以上若從依分則言依止緣性若從依止分則言為緣者之俱生前生性故為決實彼亦說是等兩者更以依諸覺他者之意樂為使所說莊嚴為詞無礙解分別了知故說是等兩者應知相雜分釋三九於相雜分云雜於善法而善法者意謂由善法以同一生等為相之相應義而為緣也云雜於善之一蘊者謂以善之一蘊為相應緣而三蘊從因緣生義也依此方法於一切句之意義應知然於此因緣中但由非色法之相應義而以為緣答三問又如因緣於所緣緣等亦爾但於異熟緣唯一答三九八今準所得之答應依答數示之故言於因三等此中凡三答者決定唯是由於善而善由不善而不善由無記而無記然於一答者唯由無記而無記耳如上所述此處分量有二種於二十三緣為三答於異熟為一答於後生無順是故依此三答一答等諸緣於二根三根等之緣配列若異熟緣入者為一餘則為三如是答數應知此處唯順說餘義可明釋順終四九然於逆緣善不可得故當以不善為始而作答此等意義易明再應於逆緣算答之分量而示之故言於非因二等其處有二三一之三種分量由此而關於二根三根等之緣之結合者其答數應知又於此處若多數與少數配列時但得少數與等數配列時則得等數又於此處唯非色法緣所生故唯就由於非因非增上非前生非後生非修習非業非異熟非靜慮非道非不相應之十逆緣示之不得餘之十四緣於是等所得中又於異熟緣生時不得非業及非異熟云於從非因緣與非增上二者不外於非因所得者二也於餘之二亦同此理趣云於非業一者以無因唯作為緣所生而由於無記而無記也云於非異熟二者就無因癡唯作之為二也云於非靜慮二者由無因五識而無記為答應知云於非道一者由無因異熟唯作而無記為答依此方法於一切配列意義應知釋逆終四三二於順逆緣者唯得前所述非因等之十逆餘不可得於可得中在因根處者為順則存在之靜慮道若為逆則不可得由與前所言者同應知釋順逆終四五七於逆順緣者於非因緣之緣所生中唯無因癡得靜慮道緣餘不得於非靜慮緣亦為八無因心云於從非業非因非增上非前生緣與所緣一者就無色界中之無因唯作思而為由於無記而無記也由此方法而隨凡所得及不得者一切處之答數應知釋逆順終相應分釋四七五於相應分云於善法相應者以善法作相應緣義餘於此處與相雜分所述同理趣應知又於終云相雜義即相應義相應義即相雜義者為欲示此等兩者從意義言則非異類雖然如是為欲決定相互之意義不可無說何以故於諸馬相雜而繫之之際則不相應者亦得言相雜若於凡修觀而與懈怠俱行與懈怠相應者則言不雜相合而亦相應於是為欲決定相雜分邊以同一生起等為相相應之相雜性又相應分邊以同一生起等為相相雜之相應性而俱說是等兩者更又依諸覺他者之意樂為莊嚴教說故為詞無礙解分別了知故於是俱說是等兩者應知雜論更於是等六分有某緣一向於順不存在唯於逆而得存在有一向於逆不存在唯於順而得存在有於順於逆俱存在以上是為雜論應知此中就最初之問為後生第二為四大第三所應之餘應知問分釋問分分別釋四八四在問分依善法對於善法由因緣而為緣耶等於善三法所應提出諸問中當說所有應得之答故言善法對於善法由因緣而為緣等也然所謂善者其自生時除後生與異熟由於餘之二十二緣而生對於善而為緣時除前生後生異熟不相應由餘之二十緣而為緣故就凡善對於善為緣之諸緣順次表示以由於因緣等為始此中不作如緣分別分云諸因對於因相應之諸法而作如是法諸因對於諸相應蘊云者為有次義蓋在彼為欲明泛義故言對於諸法此處為欲明聚義故指從緣生者依法聚生非為一一生故言對於諸蘊也或於相緣分等說以蘊為緣所生故隨於此處亦同此說然則何故於是等如斯說耶為欲無混雜分別而說耳所以然者以緣於一法而餘之諸法等之理趣而說時云確依如是如是之法而如是如是之諸法則不能知無混雜之諸能緣與緣所生也如是則應簡別略說廣說故為無混雜分別而說而作此說應知云對於諸心等起色者或為對於無記法由因緣而為緣為欲示此無記法之為物而言也然於緣分別非由於善等而分別為欲總示由一切諸因而生之色故不言對於心等起諸色而言對於彼等起諸色也故彼處攝諸無記因等起色及入胎剎那之業果色其餘如是答者其義亦由此方法而可知四八七云施施者已施捨可施之物也或下施字依彼而以施之思為施上施字為淨其思使清淨也云受戒者依五支十支等而常持戒也此但示受離蓋不言得離斷離者於世間戒非所明故然亦正為所緣緣此中斷離但對於諸有學之善為所緣其他則否云作布薩業者如願不殺生物願不取不與於此布薩日作八支布薩行也云省察之者有學異生省察其善也阿羅漢亦同此省察所以然者阿羅漢於前所作善亦同為善故也但阿羅漢以省察心乃名為唯作心故此云善法對於善法不適於此條件云前之諸善行者謂施受作指近所作事非謂是等近所作者應知或為說示施等以外諸欲界繫善而言云出靜慮者從靜慮出也或於本文不盡如此云有學者省察進姓者指預流而言所以然者彼省察進姓故也云清淨者指一來不還言所以然者彼等此心名清淨故云諸有學者預流一來不還也云從道出者超道果有分而從自得之道出也然唯單從道出而無省察者云從無常觀善者應知此處不外正觀隨行三地之善然觀善唯欲界繫云由他心智者示色界繫善由空無邊處等者以唯無色界繫善為所緣而生之無色界繫善由諸善蘊對於神通類智等者示非於人但依於法正以此故前所言之他心智又於此處再言之四八八云味著者以快俱行貪相應心而味而著之也云歡喜者以具喜渴愛而有歡喜愉悅或以現前之歡喜而歡喜之也云貪生者味著者必貪生此義亦取貪俱行心而言云見生者歡喜者依為我為我所等四心相應之見生又於此處未至究竟者疑生散亂者掉舉後悔者以我未曾作善憂生云緣彼者意謂以此等前之諸善行為所緣也此複數說亦說單數若就性類則此唯單數四八九阿羅漢從道出云者於道經路從超越果無間之有分而出也然阿羅漢之省察心為唯作無記如是已示唯作無記之所緣緣再為欲示異熟無記之所緣緣言諸有學或等也於善滅時云者為觀證用經路斷時異熟云者欲界繫異熟也為彼所緣性者以彼所緣性也彼之對於善證用為所緣者以所觀善為所緣而生之義也然非悉但以彼所緣亦為以結生有分死沒所以然者在異熟以業為所緣而所取之結生心者同以善為所緣故也然以難了別故此處非所示云於善味著等者為欲示於不善證用終之善所緣異熟而言也云對於識無邊處之異熟者雖等難了別無大異熟為彼所緣而生者故儘就可得者言之云對於唯作者已得阿羅漢果於前未等至之空無邊處逆溯或漸次對於等至之唯作也又對於他心智等者可作向轉解對於是等諸智之向轉而諸善蘊以所緣緣而為緣是實為此處之義也四九云於貪者然或他之貪也然此處之釋以自之貪為普通云味著等者同於前述之意義然於疑等之三以無可味著者故不言味著然於此處見生彼等以味著句之闕如故所出之次第不言其最初唯以疑等之中各各自分者最初言之而以各各之次者續之然於是貪等何故而是等惡法生者須知或由無忍而作惡法而起戀著或由後悔等而憂生也四九三云從無常觀眼者謂依次第觀使明瞭十粗處及所依色之十一色再度謂色處等對於眼識等是所緣故然此依識身而說非依界故不說意界如是於全部有說之者有不說之者應知云省察其果省察涅槃者為示對於省察善之所緣而說也四九六所緣增上廣說依諸有學異生而說四地之善也俱生增上廣說亦同阿羅漢已證最上法故於諸世間善無所尊重故所唯說最上道耳五五於無間緣云前前之諸者總言就同一地之善及異地之善也云隨順對於進性隨順對於清淨者謂由於異所緣云進姓對於道清淨對於道者謂由於異地五六然於此處云善對於出起者此所謂善乃三地善所謂出起乃三地異熟所以然者彼等從善證用經路出起是故言出起此有二種為彼所緣及有分此中於欲界繫善俱有兩出起於大唯有分此云道對於果者出世間異熟為證用經路所攝故無名為出起者故特別言之云諸有學之隨順者在無學若無善之無間則令作分別云對於果等至者亦對於預流果一來果不還果等至又云對於果等至者對於不還果等至也於不善者二種出起任何皆得五九此處云諸異熟無記唯作無記者諸異熟無記但對於諸異熟無記諸唯作無記但對於諸唯作無記應知有分對於向轉等者雜說之也此中唯作云者為欲界繫唯作此對於二種出起之隨一皆為無間緣大唯對於有分然於前緣分別廣說始以前前之諸善法對於後後之諸善法由無間緣而為緣而以善對於善善對於無記不善對於不善不善對於無記無記對於無記無記對於善無記對於不善七分為所說亦由於彼等而略分別無間緣此處若廣說者由於十種十七種又正則由六十種更復廣說於多種當以善審而觀察所以然者此無間緣不但以七種得廣說善對於善及異熟不善對於不善及異熟異熟對於異熟及唯作唯作對於善及不善及異熟及唯作以上十種皆得廣說不但十種而已善對於善及善異熟及不善異熟不善對於不善及不善異熟及善異熟善異熟對於善異熟及不善異熟及唯作不善異熟對於不善異熟及善異熟及唯作唯作對於唯作及善及不善及善異熟及不善異熟如是十七種得廣說之不但十七種而已由六十種亦得廣說然則如何以欲界繫善由地別而對於四種之善為無間緣色界繫無色界繫但對於各各自地以上善對於善由六種而為無間緣然欲界繫善對於欲界繫善異熟對於不善異熟對於色界繫異熟對於無色界繫異熟對於出世間異熟色界繫善對於色界繫異熟對於欲界繫異熟無色界繫善對於欲界繫善異熟對於色界繫無色界繫出世間異熟出世間善對於出世間異熟以上善對於異熟由十二種而為無間緣不善對於不善對於不善異熟對於三地之善異熟以上由五種而為無間緣欲界繫善異熟對於欲界繫善異熟對於不善異熟對於色界繫異熟對於無色界繫異熟以上欲界繫善異熟對於異熟由六種而為無間緣色界繫異熟對於三地之善異熟由三種而為無間緣無色界繫異熟對於無色界繫異熟對於欲界繫善異熟以上由二種而為無間緣出世間異熟對於四地之善異熟以上由四種而為無間緣如是善異熟對於異熟由十三種而為無間緣不善異熟對於不善異熟對於欲界繫善異熟以上由二種而為無間緣如是任何地位異熟對於異熟由五種而為無間緣然欲界繫善異熟對於欲界繫唯作不善異熟亦同色界繫異熟亦同無色界繫異熟亦同如是異熟對於唯作由四種而為無間緣欲界繫唯作對於三地之唯作色界繫無色界繫唯作但對於各自之唯作以上唯作對於唯作由五種而為無間緣欲界繫唯作對於不善異熟及三地之善異熟色界繫唯作對於欲界繫善異熟色界繫異熟無色界繫唯作對於任何四地之善異熟以上唯作對於異熟由十一種而為無間緣又欲界繫唯作對於欲界繫善對於不善以上對於善不善由二種而為無間緣如是正由六十種皆得廣說又不但六十種而已由於多種亦復可得然則何如以欲界繫初大善心先對於自及對於四色界繫善為根本觀行而對於十六之快出世間以上對於二十一善於證用終對於為彼所緣及有分而生之十一欲界繫異熟對於為彼有分而轉之色界繫無色界繫異熟對於為果等至而轉之十二出世間異熟以上如是對於二十一善對於三十二異熟以上對於五十三心為無間緣第二善心亦同然然第三及第四除上地諸善及出世間異熟對於餘為二十一心第五及第六對於自及對於九個上地捨善及對於二十三異熟以上對於三十三第七第八唯對於二十一五個色界繫善對於各自後之色界繫善又對於四個智相應大異熟對於五個色界繫異熟以上對於十由與是同理趣故無色界繫諸善之中最初與自之異熟俱對於十一第二對於十二第三對於十三第四對於十四及果等至之十五出世間善但對於各自之異熟於八之貪俱行之一一不善對於十一之欲界繫異熟意識界及九之大異熟及各自後者之二十一二憂俱行對於捨俱行之六個欲界繫異熟意識界及自後者之七疑掉舉俱行之二與快俱行無因異熟俱對於十一欲界繫異熟意識界及九個色界繫無色界繫異熟及自後者之二十一善異熟五識對於善異熟意界意界對於二個異熟意識界此等二個中之快俱行對於十有分之異熟意識界及彼所緣時之自並後之建立唯作之十二然捨俱行之無因意識界對於向轉意界及向轉意識界二處對於十之異熟意識界正為十二三因大異熟除快俱行推度對於十欲界繫異熟意識界及色界繫無色界繫異熟及二向轉共二十一二因異熟除大異熟對於餘之十二五個色界繫異熟對於十七之三地善異熟之有因結生心及二個向轉共十九無色界繫異熟中之最初對於四個欲界繫善異熟之三因結生心及四個無色界繫異熟心及意門向轉共九第二除下異熟而對於八第三除二個下而對於七第四除三個下而對於六四個出世間異熟對於十三之三因異熟及各自後之十四不善異熟五識對於不善異熟意界意界對於不善異熟無因意識界此對於彼所緣時後之自對於死沒時而為結生及為有分而轉者九對於欲界繫異熟之二捨俱行小唯作之十二唯作意界對於十識發微笑唯作在五蘊有者對於為有分而轉之九個三因異熟對於為彼所緣而轉之五個快俱行異熟及對於自之後者以上若不重說則對於十三建立唯作除唯作意界而對於十之欲界繫唯作對於欲界繫之諸善不善於五蘊有為有分而轉之十五異熟心以上對於四十五欲界繫三因快俱行二唯作對於為有分而轉之十三個三因異熟對於為彼所緣而轉之五個快俱行異熟對於為淨治而轉之四個色界繫唯作對於為阿羅漢果等至而轉之四個快俱行阿羅漢果等至對於自之後者以上若不重說則對於二十五二因快俱行二唯作對於如上述之十三有分心對於五個彼所緣對於自之後者以上若不重說則對於十七二欲界繫三因捨俱行唯作對於與彼等相同之十三有分對於為彼所緣而轉之六個捨俱行異熟對於為淨治而轉之一個色界繫唯作對於四個無色界繫唯作對於阿羅漢果等至對於自之後以上若不重說則對於二十四二個二因捨俱行唯作對於彼等相同之十三有分對於六個彼所緣及對於自之後以上若不重說則對於十八色界繫唯作中之一一對於五蘊有之九個三因有分及對於自之後者以上對於十無色界繫唯作中之最初對於五蘊有之九有分對於四蘊有之一及對於自之後以上對於十一第二者於四蘊有而得二有分第三者三第四者得四個及果等至以上於彼等之一一如次第對於十一十二十三十五為無間緣如是就多種而得廣說故曰由於十種十七種又正則由六十種更復廣說於多種當以善審而觀察等無間緣意義明瞭五四四於親依止緣云親依止於信者以於業業果此世間他世間等之信為親依止也譬如人信下方地中有水而掘地此有信之善男子信施等之果及利益而起施等是故為言親依止於信也親依止於戒等亦以是戒等諸法為親依止之義也所以然者戒具足者熟知戒偉力及戒利益故親依止於戒而於戒具足者輩與之施亦受幾重清淨無缺之戒於十四日等半月之日作布薩業依戒成就而令生靜慮等多聞亦然一切成就依施等之福行及施等之染污及清淨等之別由聞所成之慧而辨別而住者依於聞而起施等勝解施捨之施捨具足者亦然依自之施捨成就而與施若於戒具足者則與之大果受戒作布薩業由行此故而清淨心令生靜慮等慧具足者亦然一一探求此世間他世間之利益及世間超出之方便者由行此慧故而得成就此世間利益及他世間利益及世間超出方便親依止於慧而起施等然信等但對於施等不僅為親依止為於自之後分所生信等亦為親依止故言若信若戒若聞若施捨若慧對於信戒聞施捨慧也云淨治者不作現前之淨治解應作前分之淨治解對於如業生智乃至對於未來分智云者對於是等二個同為天眼淨治也淨治非他但為天眼之附帶智如業生智未來分智等者於是天眼成就時成就如是則又對於與此勝解性俱之天眼淨治為對於此等之淨治應知雖然是等非對於全部天眼而俱起者故於此處應為別個之淨治天眼對於天耳界云者見遠方之色而欲聞彼等之聲者為天眼對於耳界淨而為親依止再由聞彼等之聲而欲行於彼處等為天耳界對於神通類智而為親依止如是全部親依止緣性由助成性可知親依止於道而起未生等至云者依如是如是之道而使障礙緩和障礙斷除由是而起如是如是之等至以此義故而彼等道對於等至為親依止云觀者為更求上位之道而觀者也云對於義無礙解等者諸無礙解唯由於道獲得而成就故復次如是成就是等後於如是如是諸所緣而轉故道即與以親依止名五四五云親依止於信而語慢者為以我能信能淨信而起慢也云執見者於如是如是之說但以信而歸依不以慧而觀察義理由於有補特伽羅人我等而執邪見者也云於戒於聞於施捨於慧者為我是戒具足者聞具足者施捨具足者慧具足者之語慢也又如於戒聞施捨慧之慢矜生見矜而執見者也對於貪等者依具足信等於自讚時彼信等中一一法對於貪於他毀時對於瞋對於與兩者相應之癡對於前述之慢及見類又依具足信等對於欲得後有受用之欲願為親依止如是於此處但示世間善反之出世間善為寂靜為至善為最上而為摧破不善者是故如對於月之黑暗非謂對於不善不為親依止也五四六云使苦等者欲說屬於身苦之無記法而言也所以然者信者依於信而不辭極寒極熱作種種工事或經營事等責令自苦因之欲作福以致富享受以所求為本之苦戒具足者亦為欲護持其戒依露地住等事而苦責自己依常乞食等事而享受以所求為本之苦聞具足者亦以欲修適於多聞之行與上述同理趣隨逐修行苦責自己享受以所求為本之苦施捨具足者亦依勝解施捨事以僅能自己生存之必需品施捨無餘或作肢體等之施捨如是苦責自己為生應施捨之事物享受以所求為本之苦慧具足者亦以我益欲增長智慧而依於智慧毋問寒暑精勤諷誦思惟苦責自己見邪命不正生活之過患正命正之生活之利益捨邪命而依淨命而求生計享受以所求為本之苦對於身樂云者於得信等為親依止而受用所生之樂資具時從信等等起之妙善色所遍滿之身及從信等而以無悔為本之勝上喜悅所等起之色遍滿之身於此等身所生樂時又因作此信等而生之異熟樂時此信等對於身樂為親依止緣而為緣於前述之理趣而苦之生時及由不能得信等之德而從事於殺縛等時此信等對於身苦為親依止緣而為緣又親依止於信等而起果等至時對於果成就應知此信等中一一為親依止緣而為緣善業云者善思對於自己之異熟而為親依止緣然此為強力思之謂非為微力思也此處有如次之故事傳聞某婦人為欲縊死繫繩於樹而應準備者準備已訖時有一盜夜間近彼婦家思以此繩縛物持去欲以刀斷而近詣之時此繩變為蛇嘶嘶之音作盜驚遁去婦從己家出以繩索繯首而縊死強有力之思排除支障而對於自己之異熟為親依止如是然非可一概論也所以然者但已與以機會之業排除對於異熟之支障而異熟又異熟能生之業對於異熟不可謂非親依止故所謂業者在此處為四地之任何業應知然後云道對於果等至者非就思言此事甚明凡任何異熟能生之法對於自己之異熟為親依止緣云五四七親依止於貪而殺生物云者凡於染著之事物而為所障或欲求之而殺生物也於不與取等亦然意義可知云切開漢譯校者按本文中意譯作闖竊家宅侵入口等者就不與取言之也此中云侵入口者為家宅入口處偷盜云者隱而持去也襲掠漢譯校者按本文中意譯作入家襲掠一家云者結多夥伴包圍一家共行掠奪也路傍邀掠漢譯校者按本文中缺譯邀掠二字云者作路傍掠奪業追剝也親依止於瞋等者由彼行於我不利益等而生之瞋以之為親依止也親依止於癡云者覆蔽殺生等過患之癡以之為親依止也親依止於慢云者以我何者不能殺不能取之慢為親依止也或為對於任何人皆所卑視輕賤而陵侮之者以此輕蔑為親依止之義也親依止於見云者如作施會等之婆羅門等又如貝露西耶人彌蘭迦人等之見為親依止親依止於欲願云者謂若我如是如是成就則我於彼身當致如彼如彼之供獻如是名為天願或願如是如是賜與於我或願如是如是得取人所有物或來為我作是等業之介紹以如是等欲願為親依止貪瞋癡慢見及欲願對於貪云者此處貪對於貪亦對於瞋等為親依止瞋等亦與是同理趣五四八殺生對於殺生云者住於殺生非律儀故又此人殺害他之生物或復此人為此人所殺害者之親戚朋友所殺害則并殺害及彼親戚朋友中之他者如是殺生對於殺生以親依止緣而為緣復次殺害財貨之持主或其管理人而奪取他人之財貨時殺持主而與其妻通姦時云非我殺之妄語時為欲隱蔽所作事或為欲捏造未作而設立離間語時或與此同趣而說麤惡語時作雜穢語時殺害他已而欲貪他之財寶什器時於彼所殺者之友人同僚思加殺害等時如是由我而得果遂殺生對於難作等妄思之時殺生對於不與取等亦為親依止緣以此方法以不與取等為本而循環論之其意義亦可知也五五殺母業對於殺母業云者見殺害他人母思應如是於殺害己之母者若於某生因殺害故於後生亦復殺害若但依於某生再三命令去殺我之母或為欲以二次打擊決定使死而加第二之打擊者由是殺母業對於殺母業為親依止餘亦應然與此同理趣而可知也然而強力之不善對於微力之不善不為親依止故業道之中但就無間業作是說人皆云然非必應作是解何以故作殺生等已云何故作斯耶非難時不但憤慨且亦後悔以至更生無量煩惱於彼續作使之遠離是故強力者對於微力者又微力者對於強力亦同為親依止然釋緣分別略說所言就強力因由之義而為親依止云者但言因由性之強力性非諸親依止緣之強力性也何以故業及煩惱無論強力者微力者等為強力之因緣故五五一親依止於貪而施施等者云嗚呼我將生為四大天王之友乎之生有或受用之貪於此親依止而與所施於受戒布薩業亦同此理趣然靜慮為欲伏貪觀為欲棄貪道為欲斷貪名為親依止於貪而起後求離貪性而起通起等至者名為親依止於貪而起此則唯名為離貪者對於信云者對於由施等而起之信也於戒等亦與是同理趣何以故如由施等而起信等名為依於貪而起故如是貪等亦對於信等名為親依止緣應知為避彼故云者為欲排除彼為使不生異熟身之義也於可避免者且爾然在凡諸不可避之無間業者云何而言為避彼故耶由於以彼為志願云爾我為避彼而轉云者為彼之志願故取此而為斯言耳五五二親依止於貪而使自苦云者謂以所染著者由難行而得如是思已如是作者一切與前同理趣應知對於身樂云者對於由違越貪等作善而得之樂或從貪等不見過患之人由享受諸欲而生之樂也對於苦云者對於由刻苦等而生之苦或對於因貪等而起殺縛等由之而生苦也對於果等至云者對於斷貪等而生之果等至或由貪等或由辛苦於等至之果等至也五五三身樂等者樂生時味著之者而後由於再三相同之緣使生之人前者對於後者為親依止反之在寒等之中而取於過度焚火等使之樂者前分之樂對於後分之苦為親依止或於此出家尼柔輭毛臂之觸覺實美感哉或墮落於諸欲之中者此世身樂對於地獄之身苦為親依止然由無病性而安樂者將等至於果等至之者身樂對於果等至為親依止緣復次為欲避苦使樂其樂者及為欲避苦如世尊鎮伏其病而果等至之者身苦對於身樂及果等至為親依止緣適應之時節對於樂及果等至不適應對於苦為親依止制伏不適應之時節而欲享受由等至等起色而生之樂者不適應之時節亦對於果等至同為親依止緣於飲食牀座等亦與是同理趣再身樂等者關於全體而言與前所述同理趣而其緣可知果等至對於身樂云者就由等至等起色而生之樂為所對也何以故以彼從等至出而享受故五五四就為親依止於身樂而施施等者如云嗚呼我乎願不失此樂為欲不失已得者也或云嗚呼我願於未來亦得如是之樂為欲得所未得也就於苦也亦為欲退滅之而云嗚呼願苦其滅乎或為願其不生而云願未來亦如是不生是故應知樂苦為親依止時節飲食牀座與前所述者同其理趣復次云身樂等中亦有信生如得樂者輩云善哉尊者目犍連歸命於彼佛得苦者輩云遍知如是苦而說法之佛陀實住正等覺者又為欲與樂相應與苦不相應故當成滿戒等故說樂苦對於信等而為親依止時節等亦可如是理解五五五於親依止於身樂而殺生物等亦與前述同理趣而樂等為親依止應知然於此親依止分別善對於善由三種皆以親依止緣為緣對於不善由二種對於無記由三種為親依止緣不善對於不善由三種對於善由一種對於無記由二種為親依止緣無記對於無記由三種對於善亦然對於不善亦然以上善由八種不善由六種無記由九種如是由二十三種而親依止分別應知五五六於前生者就眼等麤色而言之也又水界等亦然為前生所緣所依前生眼處等者凡為所依悉指前生者言之也所依對於異熟無記之四蘊云者指轉時之前生緣而言也五五九於後生云對於此身者為對於四大種所成之身也云由後生緣而為緣者為支持故以後生為緣也何以故由於支持者之義而為緣故唯此謂後生緣此順問分之順所傳說者五六二於修習緣云隨順對於進性等者就特別處言由前所述理趣而可知其所以然五六五於業緣云善思對於諸相應蘊此中無俱生與異剎那之區別故不言俱生然對於無記之答有此分別故於彼處言之云結生思者對於業果色言也思對於所依云者於結生剎那安住於所依之諸非色法雖以所依為緣而轉然為欲表示思亦對於所依為緣故為是言五七二異熟緣之結生分與是同理趣意義可知五七三於食緣云對於此身者就此由四相續而轉之四大種所造身對於食等起為能生者對於餘三為支持者由於食緣為緣也五八於根緣等之結生分亦與上述同理趣應知餘者任於何處意義明了問分配列順答數六二五今於此處應示依答所得之答數言於因七等也此中云七者由於善而善無記善及無記之三由於不善亦三由於無記而唯無記如是為七云於所緣九者為根一而終一者九云於增上十者善對於善為俱生並為所緣對於不善但為所緣對於無記為俱生並為所緣對於善無記為俱生以上以善為根者四不善對於不善為俱生並為所緣對於無記但為俱生對於不善無記亦然以上以不善為根者三無記對於無記為俱生並為所緣對於善但為所緣對於不善亦然以上以無記為根者三如是為十更於此處得所緣增上七種俱生亦七種云於無間七者以善為根者二以不善為根亦同以無記為根者三如是為七於等無間亦然云於俱生九者善為根者三不善為根者三無記為根者一善無記為根及不善無記為根者皆為一是為九云於相互三者由於善而善由於不善而不善由於無記而無記是為三云於依止十三者但為俱生則以善為根者三以不善為根者亦如之以無記為根者亦如之然此處亦得前生何以故無記對於無記於俱生有於前生亦有也對於善但前生對於不善亦如之復次善無記對於善為俱生前生對於無記但為俱生不善無記亦然如是為十三云於親依止九者為根一而終一者九於彼等之分別說有二十三種類其中於所緣親依止七無間親依止七本性親依止九也云於前生三者無記對於無記對於善對於不善如是為三云於後生三者善對於無記不善對於無記無記對於無記如是為三云於修習三者等於相互云於業七者等於因此中於二答傳說亦異剎那業五答但俱生云於異熟一者由於無記而無記也云於食根靜慮道七者等於因然此中傳說根由於俱生前生也云於相應三者等於相互云於不相應五者俱生後生則由於善而無記由於不善而無記俱生前生後生由於無記而無記所依前生則由無記而善不善亦然如是以善為根者一以不善為根者一以無記為根者三故為五云於有十三者俱生由於善而善俱生後生由於善而無記俱生但由於善而善無記以上善為根者三以不善為根者亦如之復次俱生前生後生食根由於無記而無記所依所緣前生由於無記而善不善亦然俱生前生而善及無記對於善同彼對於無記俱生後生食根而不善及無記對於不善同彼對於無記是為十三云於無有去七者等於無間等無間云於不去十漢譯者按日譯本作七今改正三者等於有也以上為於此處答數分量有一三五七九十十三之七種其中一答者唯異熟之一三答者相互前生後生修習相應之五五答者唯相應之一七答者因無間等無間業食根靜慮道無有去之十九答者所緣俱生親依止之三十答者增上之一十三答者依止有不去之三如是於彼彼之緣所說分由答數而善考察之由是於二根三根之緣結合者其答數可知然而某諸緣對於某諸緣而為非同分或為相違者則不能令其結合例如對於因與所緣無間等無間親依止前生後生業修習食靜慮無有去增上緣及除觀餘之增上為非同分俱生等為其同分何以故同依無有與有故所以然者因緣對於某法而為因緣則對於彼等而俱生等亦為緣故也然以所緣緣等不為緣故對於彼名為非同分以是故因與彼等或彼等與因不可結合前生與後生相應與不相應有與無有去與不去亦於於相互相違是等亦不可結合六二六此中去不可結合而從可結合者於結合所得彼等諸分略而示之故言於從因緣及增上四等也此處就因緣與增上之配列順於少數雖當有七分四增上中但觀為因緣他不然故去非同分而從同分故言四也彼等如下應知即善法對於善法由因緣而為緣由增上緣而為緣即善觀對於諸相應蘊善法對於無記法由緣而為緣由增上緣而為緣即善觀對心等起諸色善法對於善及無記之法由因緣而為緣由增上緣而為緣即善觀對於相應諸蘊及對於心等諸色無記法對於無記法由因緣而為緣由增上緣而為緣即異熟無記唯作無記之觀對於相應諸蘊及心等起諸色然此處異熟無記之觀但依出世間可得所緣緣無間緣等非同分故向不結合依此方法於一切處而知得與不得故順於所得而諸分可以引出矣云於俱生七者同於因所得者也云於相互三者唯同於相互所得者也云於依止七者同於因所得者也云於異熟一者唯同於異熟所得者也云於根道四者同於先所述之理趣也云於相應三者唯同於相應所得者也云於不相應三者應知以從善等心之等起諸色為緣所生云於有不去七者同於因所得者也六二七如是因緣與增上緣等十一緣共得結合故由於彼等已示二根之答數今欲示三根等之答數設定其型而言因俱生依止有不去七等也然於書籍所載為依止親依止增上如是不完全文字之諸緣名蓋彼唯載記號故於如彼之處可作完全本文此所設定之型依彼而說明之此之因緣與俱生等四之配列與從自分別而所得者同得七答若入相應緣則得同於彼等之三若入不相應緣則得因與不相應二根所得之三若入異熟緣則唯得與諸異熟同分之配列一答若復於此中入根道緣則與彼等二根之所得者同得四若與彼等俱入相互緣則於因增上二根所說示之四答中除善法對於無記法善法對於善及無記法之二而得餘二若更於彼中入相應緣亦得同於彼等之二若復入不相應則得餘二若復於彼等中入異熟緣則於全局唯得一復自與增上俱因增上二根不入少數之諸緣時則同得四入少數之諸緣時則順於彼等而得二一如是於彼彼諸緣之結合而知所得之答數故於三根等之答數可引出矣然此等配列中最初四配列設由無記而無記之答雖亦可得異熟因但通依九因全部但言非異熟此後配列就異熟因言在彼處者全為俱生異熟並異熟與俱生之色彼等中於最初之配列得異熟並彼等起諸色於第二得異熟及結生之所依色於第三但得諸非色法於第四得異熟心等起色於第五但得所依色以後之十五配列與根結合者就無癡因言其中最初之九無增上後之六有增上於無增上最初之四總就全部之無癡言後之五就異熟無癡言又此無增上中最初之四者與前所示於因增上二根者同第二缺心等起色第三缺所依色第四但善法對於諸心等起無記對於諸心等起得如是色此後與異熟結合之五與前所述同理趣有增上之最初三配列總就異熟非異熟因言之彼等中最初之配列之四同前所述理趣第二缺色第三缺非色此後之三就異熟因言之彼等中之最初者得色及非色第二但非色第三但得色如是復於彼彼之緣知其結合之答數則於三根等之答數可引出也因根終六二八所緣根亦然增上緣等七與所緣為同分餘十六為非同分故不結合而但結合於七也彼中云於增上七者謂善法對於善法對於不善法對於無記如是以善為根者三以不善為根者一以無記為根者三如是為七云於依止三者由所依故但以無記為根也云於親依止七者與前同云於前生三者由所依及所緣故以無記為根也云於不相應三者但由所依故云於有不去三者由所依及所緣故六二九復次如於因根示型所設配列於所緣根等亦然此中先於此所緣根設五個配列此中最初者就所緣增上而為有增上其云七者同於所緣增上所得之答第二為無增上其云三者由所依及所緣故或由所緣故以無記為根者也第三為與依止結合其云三者由所依故以無記為根者也第四第五為有增上其中第四云一者由所依及所緣故或由所緣故以無記為根之不善也第五云一者由依止故以無記為根之不善也如是亦於此處順於所得而三根等之答數可知於增上根等亦爾就所緣根異熟不詳說其結合我儕但於彼彼處將有可說之價值者說之耳六三於增上根云於俱生七者由俱生增上故以善為根者三以不善為根者三以無記為根者一然與俱生俱之所緣增上又與所緣增上俱之俱生則不得云於相互三者但由俱生增上也云於依止八者以善為根者三以不善為根者三以無記為根者二也何以故無記之增上對於無記以俱生及所緣而為依止對於不善為所緣然對於善兩方皆非是於以無記為根者唯二故為八也云於親依止七者全等於所緣云於前生一者無記增上對於不善而為所緣也云於異熟一者由於無記而無記即為出世間云於食等七者同於前一根所得者云於不相應四者由於善而無記由不善而無記由無記而無記及善也云於有不去八者全等於依止六三一然於此處之諸配列從順序而不令與所緣等結合最初與有不去為結合依何理由耶兩增上混入之故也此中於最初之配列為所緣增上而得所依及所緣第二以依止故但為鄭重而味著者之所依第三為俱生增上而諸善對於諸色為所緣增上而所依對於不善也此後之三配列就所緣增上而言之也此中於最初云七者同前所言第二云一者前生之諸所依所緣對於不善也第三但所依對於不善耳此後之三配列異熟非異熟一般為俱生增上而言此中最初者得色非色第二者但非色第三者但得色此後之三就異熟增上而言此中亦於最初得色非色第二得非色第三但得色此後為食根結合之六個配列就心增上而言之也此中三為無異熟三為有異熟彼等之答數完全明了此後之六配列完全同於勤增上而言然從增上之順序而於最初不可就勤增上而說耶何故不如是說耶以與後之就因而說諸配列相等故也何以故後之諸配列由因故無癡之觀增上性故觀之正見性故與道結合又勤之為道亦依有正精勤性邪精勤性與道配列故與以後由因而說之諸配列相等故轉倒而說之此等答數完全明了六三二於無間等無間根云七者善對於善及無記不善亦然無記對於三之隨一如是為七云於業一者善道思對於自之異熟無記也然是等配列唯有三為從多分之順序而說也六三六於俱生相互依止等之根者但就二根而說彼彼諸緣與置於初者同分故若知二根之數則彼以上諸緣所配列全部之答數可從少分之數而知六三七此中以俱生為根者為十配列彼中五為無異熟五為有異熟此中無異熟之最初者為善對於善對於無記對於善與無記及善與無記對於無記以上為四不善亦然無記但對於無記如是為九此中善不善等之八答得非色並心等起色於無記亦得所依色第二配列之無記答但得諸色中所依色第三之三答於善不善無記亦但為非色第四但為心等起色第五為與結生所依相俱之諸非色法也有異熟中之最初者為異熟並異熟心等起色第二為異熟與所依色第三但為異熟第四但異熟心等起色第五但得所依色六三九相互根有六配列此中最初之三為無異熟後三為有異熟此等之答數完全明了六四於依止根云於從依止緣與所緣三者謂以所依為緣而轉之善等可知云於親依止一者為以所依為所緣親依止而生之善也其餘與前於二根所說者同理趣可知六四一然於此依止緣有二十配列此中前六配列屬於前生俱生所說其後四者但屬前生其後之十但屬俱生此中於最初之配列云十三者同於依止緣分別所說第二云八者從俱生增上七及以崇重所依而不善是為八第三七者同於根緣所得第四云五者同於不相應所得第五云四者謂善等對於心等起及所依對於不善也第六云三者善等對於心等起也由前生故四聚之中其最初云三者謂所依對於善等眼等對於無記也第二但所依對於善等第三云一者為所依對於不善第四為眼等對於五識由俱生故十聚由有異熟無異熟分為兩種應知與俱生根所說同六四二於親依止根云於所緣七者與所緣親依止所得者同云於增上七者同於彼等無間等無間與無間親依止所得者同云於依止一者所依對於不善也云於前生一者對於不善而所依或所緣云於修習三者為由於無間親依止云於業二者為由於本性親依止但出世間善思為無間親依止云於不相應一者為由於所緣親依止於有不去亦然無有去之七全等於無間六四三又以親依止為根有七配列此中前三由所緣親依止言之其最初云七者善對於善等無記亦然不善但對於不善如是為七第二云一者眼等之無記對於不善第三為所依對於不善此後二聚屬於無間親依止而言此等答數完全明了次之二聚屬於無間本性親依止而言其最初者可取世間善不善思為緣第二但出世間善六四四於前生根云於所緣三者為無記對於善等云於增上一者無記對於不善也其餘亦同理趣六四五又此處有七配列彼中最初就所依及所緣言第二但就所依第三就所緣第四就所緣所依時第五就所緣增上第六諸所依就所緣增上時第七就眼等六四六於後生根二十緣不相應唯三緣得相應此處但有一配列謂彼對於身之善等可知六四七於修習根唯一配列六四八於業根云於無間一者謂就於道思云於相互三者此處亦可取結生之所依云於親依止二者屬無間與本性親依止同於前所說如是之餘亦可如前所說理解之六四九又於此處有十一配列此中最初之二聚分別本性親依止與無間親依止就於異剎那業言其後之四為異熟非異熟就於一剎那業而言者此中最初得與非色俱心等起色第二與非色俱所依第三但非色第四但心等起色然於結生亦得業果色次之五為有異熟與前所言為同理趣六五一異熟根之五配列意義全明六五二於食根云七等者與前所說同其理趣然此處有三十四配列彼中最初之五就一般異熟非異熟言於最初亦得四食俱第二唯三食第三為所依亦為緣所生第四缺彼第五唯色為緣所生其後之五有異熟配列與前所說同理趣其後之九配列就思食說其後之九就無增上識食其後之六配列就有增上識食此中三者通就於異熟非異熟說三者唯就異熟此中無世間異熟故缺所依六五四於根根云於前生一者由眼根等故由無記而無記也餘之二根可如前所說理解之六五五此處之配列有七十六此中最初者一切根由任何為緣而得者第二缺色命根何以故彼無依止故第三為諸非色根對於諸色第四為眼等對於眼識等其後之九配列就俱生之非色根說次九就於道之諸根此後九就於靜慮分者此後九就於靜慮與道者此後九但就意根此後有六個有增上此後由勤觀增上故道之結合者有六此後由無癡因而無增上九有增上六於彼等一切異熟緣之非相應及相應可同前說理趣而理解之六五六於靜慮根之二根亦可同前說理趣而理解之復於此處有三十六個配列其中最初之九不關於根道之性就一般靜慮分說次九就根之靜慮分又次九就道之靜慮分後九就根道之靜慮分復於此等四種九聚各各初之四聚通於異熟非異熟餘之各五但為異熟彼等理趣與前說同六五八於道根之二根亦可同前說理趣而理解之然此處有五十七配列其中最初之九無關於根靜慮性唯說道分此後之九就根之道此後之九就靜慮之道此後之九就根與靜慮之道此後之六就增上之道此後之九就無增上道因此後之六就有增上道因此中於九各各五於六各各三為異熟餘為共通彼等理趣與前說同六六於相應根之二根意義明了然於此處但有二個配列此中一聚就於通說一聚就於異熟說六六二不相應根之二根意義亦全明了此處有十三配列此中最初云五者善對於無記不善亦然而無記則對於任何三又此處此等之不相應等有俱生亦有後生前生第二但前生與俱生第三就彼等四即唯增上其中善對於無記不善亦然又無記對於無記及對於所緣增上而不善此為四第四云三者善等對於無記也然此處諸根為色及非色第五諸緣唯非色第六所依而唯色第七唯為所依此由觀故為對於善無記由味著故為對於不善第八同對於不善第九眼等對於無記第十善等對於心等起諸色十一結生所依對於諸蘊十二為諸蘊對於業果色十三為結生諸蘊對於所依六六四於有緣根云於親依止一者為所緣親依止之無記對於無記也餘二根易明六六五此處有三十一配列其中最初者由於非色所依所緣大種根食而得俱生前生後生緣第二得後生段食色命根第一第二配列與增上俱又作第三第四復於同第一而與四食俱作第五與諸色根俱作第六與色非色之諸根俱作第七復以同第二與諸根俱作第七同第一及第二與不相應俱作第八第九此中第九與增上俱作第十此後第十一除為緣所依第十二唯諸非色法為緣第十三為所依所緣第十四唯所依第十五唯所緣第十六唯所依為所緣第十七同此由於所緣增上故第十八亦同此由於所緣親依止故又第十九唯眼等為緣今十九之名雜聚者不取俱生而言此後更有十聚依俱生而言也六六七無有去根如無間等無間唯由親依止修習及業之三聚六七一不去根全與有根等然凡此等問分所說之配列大別僅二種一由於雜一由於俱生此中凡所緣根等之初不取俱生者名之為雜此等於所緣根五於增上根六於無間根三於等無間亦然於依止十於親依止七於前生七於後生唯一於修習同於業根二於食根一於根根四於不相應根九於有根十九於無有根三於去根亦然於不去根十九以上總有一百零三蓋是等決定無有俱生故言雜也然凡得俱生者說此等名俱生聚此等於所緣根不得無間等無間親依止前生後生修習無有去根何以故此等諸緣對於俱生非為緣故如對於俱生非為緣因俱生相互異熟靜慮道相應緣對於無俱生者不緣也故於因根凡十四任何配列唯為有俱生配列如是於增上根二十四於俱生根十於相互根六於依止根十於業根九於異熟根五於食根三十三於根根七十二於靜慮根三十六於道根五十七於相應根二於不相應根四於有根十於不去根十以上三百十二皆為有俱生聚與前之一百零三及後之三百十二凡四百十五配列於問分傳說如此此中凡諸緣法由名而明其不知者隨可於以因根等之理趣為初共異熟非異熟所說之諸配列示之所以然者十二因六所緣四增上四食二十根七靜慮分十二道分名為緣法故此中一向善之諸法一向唯不善一向唯善異熟一向唯不善異熟一向唯異熟一向唯非異熟一一善考察之凡此中異熟者於異熟配列凡非異熟者於無異熟配列如其所應結合可也緣摘出分之義釋今論逆緣此處如以前相緣分等緣於不善法而不善法從非因緣生等之論法所得之問由所得之緣而具體所廣說為不如是廣說而就一型式略而以逆說之攝法以善法對於善法由所緣緣而為緣等之論法將順說對於善等之諸緣摘出之然此等之緣為諸緣集成而說之者決非為一一之緣而說之者故凡此處為集成而說之諸緣可分別而理解之何以故此等二十四緣之全部攝於八緣之中故於何等八中耶曰於所緣中於俱生中於親依止中於前生中於後生中於業中於食中於根中何故爾耶以除此等八緣餘之十六緣中因緣相互異熟靜慮道相應緣此等六緣一向為俱生唯由對於諸俱生者而為緣故攝於俱生緣復次無間緣等無間修習無有去緣此等五者但生滅之法對於自之無間次生者而為緣故由無間親依止之相而攝於親依止依止緣由俱生與俱生之別有二種此中俱生依止但對於諸俱生者為依止緣故攝於俱生緣前生依止攝於前生緣增上緣亦由俱生增上所緣增上而有二種此中俱生增上但對於諸俱生者為增上緣故攝於俱生緣所緣增上不外所緣親依止故由所緣親依止之相而攝於親依止緣不相應緣由俱生前生後生之別有三種此中俱生不相應對於諸俱生者唯由不相應緣故攝於俱生緣前生不相應者生於前而對於生於後者為緣故攝於前生後生不相應者生於後而對於生於前者以支持而為緣故攝於後生緣有緣不去緣者由俱生前生後生食根及有不去之中各一而設為六種此中俱生之有不去對於俱生者唯有有不去緣故攝於俱生緣前生者生於前而對於生於後者為緣故攝於前生緣後生者生於後而對於生於前者以支持而為緣故攝於後生緣食者攝於段食緣根者攝於色命根以上十六緣攝於此八緣中如是應知復次此等八緣亦互相攝何以故初所廣說之所緣緣有增上非增上二種此中增上者由所緣親依止之相而攝於親依止非增上者唯單所緣緣業緣亦由俱生及異剎那有二種此中俱生業唯由對於自及俱生者為業緣故唯攝於俱生異剎那業由有力無力有二種此中有力業對於諸異熟法有以親依止而為緣義故攝於親依止又有力對於諸色無力對於諸非色由異剎那業緣而為緣食緣亦二種為色非色此中非色食唯有對於自及俱生者為緣以此義故攝於俱生緣色食對於俱生前生後生則不為緣經自之生起剎那而達於住者成食緣性以此義故唯為食緣根緣亦有色非色二種此中非色根緣但對於自及俱生者成根緣以此義故攝於俱生緣色根緣又由內外之別有二種此中內根緣對於生於前生於後之相應法俱之眼識等為根緣以此義故但攝於前生緣稱外根緣者為色命根此雖對於俱生者為緣但由維持以為緣而非由能生故唯為根緣如是此等八緣又更互相攝應知是為前之八緣與餘之十六及此等八相攝之理趣也即今應知二十四緣中各各攝於此等八緣之一一中者此中先論最初之所緣緣此但所緣緣攝非餘之二十三攝也第二俱生緣為因緣俱生增上緣俱生緣相互緣俱生依止緣俱生業緣異熟緣俱生食緣俱生根緣靜慮緣道緣相應緣俱生不相應緣俱生有緣俱生不去緣此等十五緣攝第三親依止緣為增上之所緣緣所緣之增上緣無間等無間親依止修習緣異剎那強力業緣無有不去緣此等九緣攝第四前生緣為前生緣前生依止緣前生根緣前生不相應緣前生有緣前生不去緣此等六緣攝第五後生緣為後生緣後生不相應緣後生有緣後生不去緣此等四緣攝第六業緣唯為異剎那業緣攝第七食緣但由段食而食緣食有緣食不去緣三緣所攝第八根緣為色命根緣根有緣根不去緣此等三緣攝於此等八緣之一一所攝之緣以如是知凡於其處所攝者由其數而有所言應知如是由此等攝一切緣之八緣於此之逆者摘出四十九問中善法對於善法由所緣緣而為緣等之十五問而為答此中善對於善善對於不善善對於無記善對於善無記以上以善為初者四問以不善為初者亦然又無記對於無記無記對於善無記對於不善以上以無記為初者三善及無記對於善如是對於無記不善及無記對於不善如是對於無記以上以二為根以一為終者四此等中於最初之問者全攝凡應有諸緣而說三緣於第二者二緣於第三者五第四者唯一第五者三第六者二第七者五第八者一第九者七第十者三第十一者三第十二者二第十三者四第十四者二又於第十五亦同四緣此等不言由於俱生緣而言為俱生為後生其理趣於後應釋然略舉緣之分量於此處適有一二三四五七之六種是限問分之逆問上分量且又限於攝彼彼諸緣而說示緣之分量也何以故無論於從非因緣等二十四緣逆中或一逆中由是以上問與緣皆不可得而以下則可得故也是故凡於諸問云善法對於善及無記法由俱生緣而為緣者傳說唯有如是一緣若此緣為否定時則無彼等之問然於此問善法對於不善法由所緣緣而為緣由親依止緣而為緣傳說雖有如是二緣而此中云從非所緣緣者如是一緣雖否定由於餘緣而此問亦可得若彼等二緣皆為否定則無其分如是凡於三四五或七之所得彼等之問除所否定諸緣由於其餘而得彼等之問若全體諸緣為否定時彼等一切分皆不可得正是於此處之相也由於此相從初彼彼諸問略而說之諸緣種類於彼彼之緣而彼彼之問其缺不缺可知也六七四此以下為廣說先於最初之問由三緣而示十九緣為何然耶以善對於善唯由於前生後生異熟不相應為無緣由於餘之二十而為緣所緣唯為彼等中之一若於俱生由攝一切而曾說攝十五緣彼等因緣否定時為十四然善對於善無異熟緣無不相應緣以此義故除彼等二指餘十二而言由於俱生緣而為緣於親依止緣亦攝一切而曾言攝九緣其中增上之所緣緣所緣之增上緣為所緣增上但已同入於親依止然善對於善以非異剎那業緣之意味除之而指餘六言由親依止緣而為緣如是可知最初之問由三緣而示十九緣此等中於此因逆云善法對於善法由因緣而為緣者謂由於如是施施受戒作布薩業而省察之省察前諸善行云等但以與所緣緣等所言同理趣故當出示本文然除所緣緣時不用如是廣說應入因緣廣說而示本文於餘緣之否定處理趣亦與是同然此緣否定時所無之諸分皆可於後釋之然於第二問由二緣而示三緣如何然耶以善對於不善無無間等為緣故除彼等而指由所緣親依止所攝之所緣增上並本性親依止而言由親依止緣而為緣也是故單就所緣緣所緣增上之增上緣親依止緣此為第二問由二緣而示之三緣應知然於第三問由五緣而說十八緣如何然耶以善對於無記但不由相互前生修習異熟相應而為緣由餘之十九而為緣其中所緣緣則一又善對於無記不由相互異熟相應而為緣捨棄因緣別言業緣是故除是等之五而說與俱生之十緣由親依止緣者於前所說之中除修習而餘五後生唯一俱生異剎那之二種業緣亦然如是第三問由五緣而示此等十八緣應知於第四問由一緣而正說十緣何故爾耶善對於善無記於俱生所說十五中不由相互異熟相應不相應為緣否定因緣除此等五而餘十緣此處由一緣說應知又如此等以善為初者四則以不善為初之四問亦由彼彼諸緣而示彼彼諸緣應知六七六此中無記之三問中於第一問由七緣而說二十三緣何故爾耶無記對於無記任由二十四緣皆得為緣在否定因緣時則為二十三其中所緣緣唯一又於此處為欲攝非俱生別言食根緣故除此等三由俱生說十緣也由親依止者為先說之六前生唯一後生食根緣亦然如是此處由七緣而說示是等二十三緣應知於第二亦依三緣而說示十二何故爾耶所緣緣一又依親依止者由所緣親依止而說示所緣增上無間等無間無有去親依止緣之六緣依前生者為前生依止不相應有不去緣如是此處依三緣而說示此等十二緣應知於第三理趣亦與是同六七七此後之二根四問中其最初問不言由俱生緣由前生緣而言為俱生為前生者由此二而說示依止有不去之三緣也何以故善蘊與所依俱於善不成緣性且如雖為俱生而非俱生緣所以者何所依混入故是以對於此等俱生者以依止有不去故言俱生也於所依理趣亦與是同如是雖為前生以蘊混入故非前生緣但依以前生為依止等而言前生也於第二問言為俱生為後生為食為根依此四者而示俱生依止有不去之四緣也何以故於此分得俱生緣後生等不得故也然就稱後生之食根者之有不去言所以然者諸善蘊與無記大種對於諸所造色由俱生緣由依止緣由有不去緣之四種為緣然後生之諸善同與此等大種俱同對於此等所造色由有不去而為緣段食亦與後生諸善俱對於前生之身但由有不去而為緣色命根亦與後生諸善俱對於諸業果色但由有不去緣而為緣指有上四類緣故言俱生後生食根也然後生食根緣於此處決不可得於後不善混入之二問理趣亦與是同如是於此處各各諸問略要而說諸緣種類應知然就彼彼之緣而說明彼彼諸緣之缺不缺且待後文六七九今已說是等善法對於善法等依順之十五分於逆亦但為是等雖是以上非有以下有故彼彼逆所得分都可依初之算數而示之始言於非因十五等也此中云於非因者全準已說由諸緣而得十五於非所緣之俱生中入因緣於彼彼分無單所緣緣依所餘之緣而彼等之分得其答又如於非所緣餘亦如是俱生之中入因緣又於彼彼分云於非親依止於非無間無如是逆而設置之諸緣依餘緣而彼彼之分而得其答然於非俱生者善法對於善及無記不善法對於不善及無記善及無記法對於善不善及無記法對於不善無此等四分何以故是等四分中於初之二者以由俱生緣而為緣說由十一緣而一攝緣則彼等否定俱生緣時由餘相不能得答於最後之二指依止有不去緣而言俱生前生也彼等否定俱生時餘之因等及前生皆由依止有不去而不得答是故此等四分任何亦無由其餘而言十一也此中如因被否定時由餘之增上等而得彼等之分然如俱生被否定時由餘因等何故不得耶無分故也何以故因等以唯俱生之一分為有分是故彼等被否定時由於其餘尚得彼等之答分然俱生為無分而亦全攝取因等是故彼被否定時彼等得全被否定所以然者非俱生之因緣等決無有故是以俱生無分故彼被否定時彼等兩分皆不可得又於為俱生為前生之答分者設雖為俱生緣於此處俱生之非色蘊以依止有不去為緣故又俱生被否定時俱生依止有不去全被否定是以被否定故彼等之分任何不得如是此處無此等之四分但由其餘而言十一也於非相互非依止非相應亦無彼等諸分何以故順俱生故所以者何如非色法之俱生緣由無分而攝取四非色蘊相互依止相應亦然由順於俱生故是等被否定時彼等答分不得應知是故言於非相互十一於非依止十一於非相應十一云此中設此等無區別攝善等別四蘊故雖順俱生然善對於善無記除俱生緣非為別緣是故彼被否定時雖彼分應無然善對於善無記決非相互緣彼定時何故無分耶由於相互緣法而生轉故也恰如善無記對於善雖無俱生緣以俱生法故由依止緣等而生轉因是彼否定時其分即無如是於此處亦以相互緣法故由俱生等而生轉因是彼否定時其分即無由非相互緣而為緣句義如下凡諸法雖非由言相互緣者而為緣然善對於善無記由俱生等而為緣由諸相互緣法而為緣是故彼被否定時彼分即無如是餘三亦爾故四分無於非依止十一者亦於此處一向為俱生緣法之依止故依止被否定時彼等之分即無於非前生十三云者除為俱生為前生二根之答外為十三也何以故如彼等在否定俱生時由前生之依止有不去而不得答如是在否定前生時亦由俱生之依止有不去而不得答是故除彼等而為十三應知云於非後生十五者此處或由後生而為緣然傳說或為俱生為前生為食為根故除後生由其餘而亦得彼等之問故言十五也於非業等者業異熟食根靜慮道皆不外善等別四蘊之一分是故除此等法由餘法而為俱生諸法之緣者非無一問答也云於非相應十一者就彼等四分相應諸法由俱生等之緣法為緣是故由否定相應緣而無彼等之分應知云於非不相應九者以二為根以一為終者四以一為根以二為終者二此等六分一向與不相應法相應此等由俱生等為緣故不相應被否定時此等全無唯得九矣故言於非不相應九也於非有非不去亦不外此等應知所以然者此等一向與有去緣法相應故由彼等被否定時此等即無也於所得者亦可由所緣或由無間等作答依俱生前生後生食根別之五由有不去或不相應法不可作答云六八如是於逆所得分已示其數今應示依二根等之算數以於從非因緣與非所緣十五等為始也此中就非因根二根者多數與少數俱所結合者從少數六八一於三根云與非親依止十三者除善對於不善不善對於善之二分何以故與非所緣俱非親依止之配列故所以者何由所緣及由親依止而此等轉然並去此兩者故不外取所緣增上之為所緣親依止也六八二於六根亦云於非親依止十三者不外此十三也六八三然於七根云於非親依止七者與非俱生配列故是處與無四俱善對於善善對於不善不善對於不善不善對於善此等由無間親依止本性親依止而轉之四故無此八由其餘而言七也云於非前生十一者與非俱生俱配列故為十一云於非後生九者於此等十一中為俱生為後生為食為根所得二根答之無記除此等分所以然者此等於俱生被否定時由後生雖不無然與俱生俱後生被否定時故為無義由餘而言九也六八四於八根云於非依止十一者全等於前之所說六八五於九根云於非親依止五者善三法等終於無記者三及二根終於無記者二是為五於彼等由異剎那業段食色命根後生法而答應知六八六於十根云於非前生五等亦不外彼等云於非後生三者除由後生所得之無記為終者二而計其餘於於非不相應亦同此三云於非有二者由異剎那業而善與不善之對於業果色也然於此處之異熟與非親依止配列故不得六八七於十一根之算數全同於前所述六八八於十二根云於非業一者由無記而為無記又此處之答由於食根者可知於十三根等全云一者亦不外是可知然於非食者由根而答應知於非根者由食而答應知六八九於十四根與非業配列故非有非不去不言得云從非食緣及非靜慮緣者除非根言故於其處由根而得一應知云從非異熟緣從非根緣者除非食緣漢譯者按此處除非食緣原譯無非字今補之而言故於其處由食而得一應知然此等二置之逆中者無算數故一概無所示非因根終六九五於非所緣根等亦於全二根有十五十三十一九之四個根本答數之別然於三根等多緣結合更得七五三二一答數之別於彼等中凡於諸緣結合所得者可由前述之理趣善思察而摘出之又全於此等非所緣根等超越非所緣等句以非因句結於最初而輪說之然彼等全等於非因根所言故不廣說而略說之此中如於非因根非所緣非親依止亦各各得十五分且於結合者唯得十三如是於一切處唯得十三又與非所緣非俱生共非親依止者有七分與非親依止非所緣共非俱生者亦有七云於從非依止緣云云非親依止緣云云與非後生三者為善等而終無記者也彼等以業果色及食等起為緣所生七二六於非食非根根之四根者不與非業俱配列故如於非因根一向得之七三七於非根根者置非親依止及非前生而可作於非食三云者為非根緣以下配列此等二緣如於從非根緣乃至非親依止緣與非食三於從非根緣乃至非前生緣與非食三是等二緣與非食緣相共計算答數之義也此中云三者唯善等對於無記也此中善不善對於諸業果色及前生之身以後生緣為緣然無記之心心所唯為後生緣以上三答為是等應知然於後者與非後生配列故言於非食二也此處就業果色善對於無記不善亦然唯以上得此然食被否定故段食雖由有不去亦不得緣性七四一非不相應根之四根云於非親依止五者為善對於俱生善善對於名為業果色之無記不善對於俱生不善對於名為業果色之無記無記對於無記如是五也云於從非不相應緣乃至與非親依止三者由與前述同理趣而為善等之三對於無記也七四五云於從非有緣與非因九者同於前說從非因緣與非有之九何以故全以一為根以一為終者由無間本性親依止而得故云與非所緣九者亦唯是等置非所緣於非親依止應為二乃至依止者於此就非有根之論法云從非有緣非因緣非所緣緣如是次第進而至於非所緣緣與此等之三或與由此以後之非增上等隨一相俱乃至達於依止緣而進行於非親依止應作二答之義也七四七設如是論式再從非所緣乃至非依止止取此七緣而言與非親依止也此處云於從非有緣非因緣非所緣緣乃至與非親依止二於從非有緣非因緣非所緣非增上緣與非親依止二如是以從非所緣後之非依止為終之一切句應與之結合然於此處云二者為善對於無記不善對於無記由異剎那業對於業果色為緣應知與非親依止句相俱之非前生等於一切處為二然業緣則此中不取何以故若取彼時則亦捨此等之分所以決不得彼答也如是與彼彼相俱彼彼結合時以所得者與不得者全體善考察之可按出一切緣之答數順逆七五二於順逆云於因七於所緣九如是於順及於非因十五於非所緣十五如是於逆其所得答數諸緣可由凡逆置者所得逆諸分中與凡順置者所得順諸分之相等分量而知其答數何以故於順之因緣以於因七而得七分於逆之非所緣緣以於非所緣十五而得十五分彼等中凡所言於因七與於非所緣所言十五中之善對於善對於無記對於善無記不善對於不善對於無記對於不善無記無記對於無記是等之七相等指是而言於從因緣與非所緣七也與非增上七等亦與是同理趣然於非俱生者無因緣故於非俱生一亦不得故無與之共結合者於非相互者得善等三對於色無記指此而言三也於非相應亦然然於非不相應者善對於善不善對於不善無記對於無記由非色法而為三應知非依止非有非不去者如非俱生以全不得故亦無與彼等作結合也如是於此處但有七及三之二分量由彼等與少數俱時減多數之答數而可知緣配列之答數七五三此中云因俱生依止有不去則於非所緣七者為善法對於善法由因緣而為緣由俱生依止有不去緣而為緣由非所緣緣而為緣也善因對於諸相應蘊由因緣而緣由俱生依止有不去緣而為緣由非所緣緣而為緣也由以上理趣而按出七分於非增上七等理趣亦與此同七五四於第二配列相互入故除非相應於餘言三也然於非相應指相互不相應之結生名色而言一又相互緣於此處入於順配列中由逆者不得故不言非相互又同此處如是於餘之配列既入順配列中之緣由逆者不得亦不言之七五五於第三配列相應入故全唯是三七五六於第四配列不相應入故全由無記而無記為一此後異熟相應時理趣亦與是同七六二云因俱生依止根道有不去則於非所緣四者善對於善善對於無記善對於善無記無記對於無記由以上等應知於餘理趣亦與是同云於非相互二者善對於善無記無記對於無記也以下云二者理趣亦與是同由此方法於一切配列之答數準所得者應知又於此順逆者由俱生並由於雜而說是等全四百十五之配列是等中於彼彼配列凡為順置之緣則雖一逆而不得又於此處之因根於最初之配列順置五緣故逆則出十九緣如是於餘亦以順置之餘為逆出者也又於此處順置多緣逆亦唯一一引生應知又如於因根於所緣等根全式與此同形應知逆順一八於逆順亦然順如於因七於所緣九及逆如於非因十五於非所緣十五於得答數之諸緣凡逆而置之者逆所得諸分中與凡順而置之者順所得分相等諸分由是而答數可知何以故於逆之非因緣以於非因十五得十五分於順者以於所緣九得九分故也此中凡言於非因十五等中其九分等於所緣所言之九由是而答數可知此中所緣所言之九者與非因所言十五中之九相等即善對於善不善無記不善對於不善善無記無記對於無記善不善也云於從非因緣與所緣九者指此等言之也與增上十等理趣亦與是同何以故所緣等之順算數所言諸分與非因緣一概盡得應知善法對於善法由非因緣而為緣由所緣緣而為緣即謂施施受戒作布薩業而省察之省察前之諸善行由此方法而可按出此等本文於此處云於從非因緣乃至與增上十者除觀增上由餘增上於順分別所出諸分可按出之如是於此處有九十七三十三一答數之別由是與少數俱減多數之算數等於少數非因根等論法之一根等一切結合其答數可知是為一般之論式然不通於一切結合某緣與某緣結合時除凡相違分外由餘分而可知此處之答數一九此處云於從非因緣及非所緣緣與增上七者所謂善對於不善無記對於善無記對於不善等由所緣增上所得之三分相違何故爾耶所言從非所緣緣故也故此處除彼等而但由俱生增上之理趣為善對於善對於無記對於善無記不善對於不善對於無記對於不善無記無記對於無記如是七分應知彼等亦由從非因緣之語除觀增上由餘增上如是全由少數緣及相違數而可知其答數凡諸緣逆置時其順者不存在亦可知譬如無間逆置時等無間修習無有去之順者不存在俱生逆置時因相互異熟靜慮道相應之順者不存在依止逆置時所依前生之順者不存在食或根逆置時因相互異熟靜慮道相應之順者不存在然所緣逆置時雖增上親依止之順者存在而不得所緣增上所緣親依止由此方法而知凡所得者與所不得者順於所得者而摘出諸分可也此中全部三根等所得諸分同於無間七等之二根所得一一三然於七根等云於從非俱生緣乃至與依止三者就由於前生而所依止者三與業二者唯異剎那業與食一者由段食與根一者由六色根次進而云與不相應三者由於善等而終無記之後生也與有不去云五者彼等三及善無記對於無記不善無記對於無記由此二後生根也然後生緣逆之以後云與有不去一者無記對於無記由於食根言非食時不可言從非根言非根時不可言從非食緣亦然何以故二者並言時無可算之分故也靜慮道等逆置時亦然食或根之一作順而終者為與根一與有一與不去一故言與食一乃至與有一與不去一也餘在此處義亦已明非因根終一三非所緣根等中於相互根而云於從非相互緣與因三者為善等對於諸心等起色也云與增上八者於增上所言十中除善對於善不善對於不善之二而為餘之八也云與俱生五者於因所述之三及善無記對於無記不善無記對於無記之二也云與依止七者此等之五及無記對於善無記對於不善之二由所依者也云與業三者不外於因之所述者於餘之三理趣亦與是同云與增上三者不外前所述者一四八於非食根中云與相互三者除食而由餘之心所可知此處亦如前但言非食非根中之各一不並言二者一五四云於從非相應緣與因三者同於前非相互所述云與增上八者不外前所述也於非不相應根云與業五者善等思對於俱生善等異那剎之善不善思對於異熟對於業等起色是為五也與食根三者等於俱生與靜慮道三者等於因一六九於非有根因者無以非有為名決定唯有故此不言而言與所緣九也又如因於他亦然與有緣之相相應者與此處若為順則不存在然云與業二者由異剎那業言之從逆者全得一七二又從順所得者任何不取後之諸分逆者取之其順者得結合於後故於此處言於從非有緣非因緣乃至非不去緣與業二也然則何故是於自處不言耶餘全逆置唯一順可得故也一七三此處云於從非有緣非因緣乃至及非不去緣與親依止九理趣亦與是同然此由本性親依止言由此方法而凡所得者所不得者前後所述應知
